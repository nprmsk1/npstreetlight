function bindLampPicker(root,idPrefix){
  root.querySelectorAll('#'+idPrefix+'_type label').forEach(l=>l.onclick=()=>{
    root.querySelectorAll('#'+idPrefix+'_type label').forEach(x=>x.className='');
    l.className='sel sel-'+l.dataset.v;l.querySelector('input').checked=true;
    root.querySelector('#'+idPrefix+'_typeother').style.display=l.dataset.v==='other'?'block':'none';});
  root.querySelectorAll('#'+idPrefix+'_watt label').forEach(l=>l.onclick=()=>{
    root.querySelectorAll('#'+idPrefix+'_watt label').forEach(x=>x.className='');
    l.className='selw';l.querySelector('input').checked=true;
    root.querySelector('#'+idPrefix+'_wattcustom').style.display=l.dataset.w==='custom'?'block':'none';});
}
function readLampPicker(root,idPrefix){
  const t=root.querySelector('input[name='+idPrefix+'lt]:checked');
  const w=root.querySelector('input[name='+idPrefix+'wt]:checked');
  let watt=w?w.value:'';
  if(watt==='custom')watt=root.querySelector('#'+idPrefix+'_wattcustom').value.trim();
  const type=t?t.value:'';
  return {lampType:type,watt:watt,lampTypeOther:type==='other'?root.querySelector('#'+idPrefix+'_typeother').value.trim():''};
}

/* ถามวิธีระบุตำแหน่งก่อน: GPS หรือ ปักหมุดเอง */
function askPoleMethod(){
  return new Promise(resolve=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;inset:0;background:rgba(27,36,48,.6);z-index:2000;display:flex;align-items:flex-end;justify-content:center;';
    wrap.innerHTML=`<div style="background:#fff;width:100%;max-width:760px;border-radius:18px 18px 0 0;padding:20px 16px 24px">
      <div style="font-weight:700;font-size:16px;margin-bottom:2px">ระบุตำแหน่งเสาด้วยวิธีใด?</div>
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:16px">เลือกวิธีที่เหมาะกับสถานการณ์</div>
      <button class="btn btn-ok btn-block" id="pm_gps" style="margin-bottom:10px;padding:16px">
        📍 ใช้ GPS (ยืนอยู่ที่เสา)
      </button>
      <div style="font-size:11.5px;color:var(--ink-soft);margin:-4px 0 14px;text-align:center">แม่นที่สุดเมื่ออยู่หน้างานกลางแจ้ง</div>
      <button class="btn btn-primary btn-block" id="pm_pin" style="padding:16px">
        🗺️ ปักหมุดบนแผนที่เอง
      </button>
      <div style="font-size:11.5px;color:var(--ink-soft);margin:6px 0 14px;text-align:center">ใช้ได้ทุกที่ · เทียบภาพดาวเทียมได้ · ไม่ต้องอยู่หน้างาน</div>
      <button class="btn btn-outline btn-block" id="pm_cancel">ยกเลิก</button>
    </div>`;
    document.body.appendChild(wrap);
    const done=v=>{wrap.remove();resolve(v);};
    wrap.onclick=e=>{if(e.target===wrap)done(null);};
    wrap.querySelector('#pm_gps').onclick=()=>done('gps');
    wrap.querySelector('#pm_pin').onclick=()=>done('pin');
    wrap.querySelector('#pm_cancel').onclick=()=>done(null);
  });
}

async function addPoleGPS(p,opts){
  opts=opts||{};
  const method=opts.method||await askPoleMethod();
  if(!method)return;
  let g;
  if(method==='pin'){
    // ถ้าซอยมีเสาอยู่แล้ว ให้เริ่มที่เสาต้นล่าสุด เพื่อปักต่อได้ง่าย
    const last=(p.poles||[]).filter(x=>x.lat&&x.lng).slice(-1)[0];
    g=await pickOnMap(last?last.lat:p.lat, last?last.lng:p.lng);
    if(g)g.acc='';
  }else{
    g=await getLocationSmart(p.lat,p.lng);
  }
  if(!g)return;
  const fresh=POINTS.find(x=>x.id===p.id)||p;
  fresh.poles=fresh.poles||[];
  // ตำแหน่งที่จะแทรก (ถ้าไม่ระบุ = ต่อท้าย)
  const insertIdx=opts.insertBeforeId
    ? fresh.poles.findIndex(x=>x.id===opts.insertBeforeId)
    : fresh.poles.length;
  const atEnd=(insertIdx<0||insertIdx>=fresh.poles.length);
  const posNo=(atEnd?fresh.poles.length:insertIdx)+1;   // เลขลำดับที่จะได้
  const isInsert=!atEnd;
  // ค่าเริ่มต้น: ใช้ของเสาต้นก่อนหน้าตำแหน่งแทรก ถ้าไม่มีก็ของซอย
  const refIdx=atEnd?fresh.poles.length-1:Math.max(0,insertIdx-1);
  const last=fresh.poles[refIdx];
  const src=opts.lastLamp||last||{};
  const defType=src.lampType||fresh.lampType||'sodium';
  const defWatt=src.watt||fresh.watt||'';
  const defOther=src.lampTypeOther||fresh.lampTypeOther||'';
  const nextNo=posNo;

  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;background:rgba(27,36,48,.6);z-index:2000;display:flex;align-items:flex-end;justify-content:center;';
  const accWarn=(g.acc&&+g.acc>30);
  wrap.innerHTML=`<div style="background:#fff;width:100%;max-width:760px;border-radius:18px 18px 0 0;padding:20px 16px 24px;max-height:92vh;overflow:auto">
    <div style="font-weight:700;font-size:16px;margin-bottom:2px">${isInsert?'แทรกเสาไฟ':'ยืนยันเพิ่มเสาไฟ'}</div>

    <button type="button" class="btn btn-outline btn-block btn-sm" id="np_adjust" style="margin-bottom:12px">🗺️ ปักหมุด/ลากปรับตำแหน่ง</button>

      <button class="btn btn-ok" id="np_save">💾 บันทึกเสานี้</button>

  </div>`;
  document.body.appendChild(wrap);
  bindLampPicker(wrap,'np');

  let coord={lat:g.lat,lng:g.lng,acc:g.acc||''};
  wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.querySelector('#np_cancel').onclick=()=>wrap.remove();

    if(!g2)return;
    coord={lat:g2.lat,lng:g2.lng,acc:''};
    wrap.querySelector('#np_coord').textContent=coord.lat+', '+coord.lng;
    toast('ปรับตำแหน่งแล้ว');
  };
  wrap.querySelector('#np_save').onclick=async()=>{
    const btn=wrap.querySelector('#np_save');btn.disabled=true;btn.textContent='กำลังบันทึก...';
    const lamp=readLampPicker(wrap,'np');
    const target=POINTS.find(x=>x.id===p.id)||p;
    target.poles=target.poles||[];
    const typedLabel=wrap.querySelector('#np_label').value.trim();
    const newPole={id:uid('e'),label:typedLabel||('เสาต้นที่ '+nextNo),
      lat:coord.lat,lng:coord.lng,acc:coord.acc,note:wrap.querySelector('#np_note').value.trim(),
      lampType:lamp.lampType,watt:lamp.watt,lampTypeOther:lamp.lampTypeOther};
    // แทรกตามตำแหน่ง หรือต่อท้าย
    const pos=(opts.insertBeforeId)?target.poles.findIndex(x=>x.id===opts.insertBeforeId):target.poles.length;
    const realPos=(pos<0)?target.poles.length:pos;
    target.poles.splice(realPos,0,newPole);
    // ถ้าผู้ใช้ไม่ได้ตั้งชื่อเอง (ยังเป็น "เสาต้นที่ N") ให้ไล่เลขใหม่ทั้งหมด
    if(!typedLabel||/^เสาต้นที่\s*\d+$/.test(typedLabel))renumberPoles(target);
    try{
      const saved=await savePoint(target);
      const savedPole=target.poles[realPos];
      wrap.remove();
      const n=realPos+1;
      toast(isInsert?('✅ แทรกเป็นเสาต้นที่ '+n+' แล้ว'):('✅ บันทึกเสาต้นที่ '+n+' แล้ว'));
      // ถามต่อเฉพาะการเพิ่มต่อท้าย (การแทรกไม่ต้องถามต่อ)
      if(!isInsert){
        const again=await askContinuePole(p,(saved.poles||[]).length,method);
        if(again){addPoleGPS(POINTS.find(x=>x.id===p.id)||p,{method:again,lastLamp:savedPole});return;}
      }
      renderDetail(p.id);
    }catch(err){
      target.poles.splice(realPos,1);
      if(!typedLabel||/^เสาต้นที่\s*\d+$/.test(typedLabel))renumberPoles(target);
      btn.disabled=false;btn.textContent='💾 ลองบันทึกอีกครั้ง';
      alert('บันทึกไม่สำเร็จ\n\n'+(err.message||err)+'\n\nเสายังไม่ถูกเพิ่ม กรุณาลองใหม่');
    }
  };
}

/* ถามว่าจะเพิ่มเสาต้นถัดไปเลยไหม */
function askContinuePole(p,count,lastMethod){
  return new Promise(resolve=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;inset:0;background:rgba(27,36,48,.6);z-index:2000;display:flex;align-items:flex-end;justify-content:center;';
    wrap.innerHTML=`<div style="background:#fff;width:100%;max-width:760px;border-radius:18px 18px 0 0;padding:22px 16px 24px;text-align:center">
      <div style="font-size:44px;line-height:1;margin-bottom:6px">✅</div>
      <div style="font-weight:700;font-size:17px">บันทึกเสาต้นที่ ${count} แล้ว</div>
      <div style="font-size:12.5px;color:var(--ink-soft);margin:4px 0 18px">${esc(p.pointName||'')} · รวม ${count} ต้น</div>

      <button class="btn btn-ok btn-block" id="cp_same" style="padding:16px;margin-bottom:8px">
        ➕ เพิ่มเสาต้นที่ ${count+1} (วิธีเดิม)
      </button>
      <button class="btn btn-outline btn-block" id="cp_other" style="margin-bottom:8px">
        ${lastMethod==='gps'?'🗺️ เพิ่มต้นถัดไป · ปักหมุดเอง':'📍 เพิ่มต้นถัดไป · ใช้ GPS'}
      </button>
      <button class="btn btn-primary btn-block" id="cp_done">เสร็จแล้ว · ดูรายการเสา</button>
      <div style="font-size:11px;color:var(--ink-soft);margin-top:10px">ชนิดหลอดและวัตต์จะใช้ค่าเดิมให้อัตโนมัติ</div>
    </div>`;
    document.body.appendChild(wrap);
    const done=v=>{wrap.remove();resolve(v);};
    wrap.onclick=e=>{if(e.target===wrap)done(null);};
    wrap.querySelector('#cp_same').onclick=()=>done(lastMethod);
    wrap.querySelector('#cp_other').onclick=()=>done(lastMethod==='gps'?'pin':'gps');
    wrap.querySelector('#cp_done').onclick=()=>done(null);
  });
}

function bindRepCards(){
  document.querySelectorAll('[data-set]').forEach(b=>b.onclick=async()=>{
    const[rid,st]=b.dataset.set.split(':');const r=REPAIRS.find(x=>x.id===rid);if(!r)return;
    if(r.status===st)return;
    r.status=st;const now=new Date().toISOString();r.updatedAt=now;
    r.history=r.history||[];r.history.push({status:st,at:now});
    if(st==='done')r.doneAt=now;
    await saveRepair(r);toast('อัปเดตสถานะแล้ว');
    if(st==='done'&&INV.length){setTimeout(()=>askRecordMaterial(r),150);}
    render();
  });
  document.querySelectorAll('[data-accept]').forEach(b=>b.onclick=async()=>{
    const r=REPAIRS.find(x=>x.id===b.dataset.accept);if(!r)return;
    const now=new Date().toISOString();
    r.status='new';r.updatedAt=now;r.history=r.history||[];r.history.push({status:'new',at:now});
    try{await saveRepair(r);toast('รับเรื่องแล้ว · ประชาชนเห็นสถานะได้แล้ว');render();}
    catch(e){alert('รับเรื่องไม่สำเร็จ: '+(e.message||e));}
  });
  document.querySelectorAll('[data-editrep]').forEach(b=>b.onclick=()=>showRepairForm(null,b.dataset.editrep));
  document.querySelectorAll('[data-delrep]').forEach(b=>b.onclick=async()=>{
    if(confirm('ลบเรื่องแจ้งซ่อมนี้?')){await delRepair(b.dataset.delrep);toast('ลบแล้ว');render();}
  });
}

      <input type="text" id="rp_lampsother" style="margin-top:8px;${lampsVal==='other'?'':'display:none'}" value="${editing?esc(r0.lampsOther||''):''}" placeholder="ระบุรายละเอียด เช่น ดับ 15 ดวง / ดับสลับต้น">
    </div>

    <div class="field"><label>รายละเอียดเพิ่มเติม</label><textarea id="rp_desc" placeholder="อาการอื่นๆ เช่น หลอดกระพริบ เสาเอียง">${editing?esc(r0.desc||''):''}</textarea></div>

    <div class="action-row">
      <button class="btn btn-outline" id="rp_cancel">ยกเลิก</button>
      <button class="btn btn-ok" id="rp_save">${editing?'บันทึกการแก้ไข':'บันทึกแจ้งซ่อม'}</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);

  const lampsSel=wrap.querySelector('#rp_lamps');
  lampsSel.onchange=()=>{wrap.querySelector('#rp_lampsother').style.display=lampsSel.value==='other'?'block':'none';};

  function refreshPoles(){
    const pid=wrap.querySelector('#rp_point').value;

    if(p&&p.poles&&p.poles.length){
      pw.innerHTML=`<label>ระบุเสาต้นที่ (ถ้ามี)</label>

          <option value="">— ไม่ระบุ —</option>
          ${p.poles.map((pole,i)=>`<option value="${pole.id}" ${(editing&&r0.poleId===pole.id)?'selected':''}>${esc(pole.label||('เสาต้นที่ '+(i+1)))}</option>`).join('')}
        </select>`;
    }else pw.innerHTML='';
  }
  refreshPoles();
  wrap.querySelector('#rp_point').onchange=()=>{refreshPoles();makeSearchableAll(wrap,['rp_pole'],'🔍 ค้นหาเสา...');};
  makeSearchableAll(wrap,['rp_point'],'🔍 ค้นหาหมู่ / ซอย...');
  makeSearchableAll(wrap,['rp_pole'],'🔍 ค้นหาเสา...');

  wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.querySelector('#rp_cancel').onclick=()=>wrap.remove();
  wrap.querySelector('#rp_save').onclick=async()=>{
    const pid=wrap.querySelector('#rp_point').value;
    if(!pid){toast('กรุณาเลือกสถานที่');return;}
    const lv=lampsSel.value;
    const dateStr=wrap.querySelector('#rp_date').value;
    // keep original time-of-day if editing, else now
    const base=editing&&r0.createdAt?new Date(r0.createdAt):new Date();
    const createdAt=dateStr?new Date(dateStr+'T'+base.toTimeString().slice(0,8)).toISOString():base.toISOString();
    const poleSel=wrap.querySelector('#rp_pole');
    const rec={
      id:editing?r0.id:uid('r'),
      pointId:pid,
      reporterName:wrap.querySelector('#rp_name').value.trim(),
      reporterPhone:wrap.querySelector('#rp_phone').value.trim(),
      poleId:poleSel?poleSel.value:'',
      wholeSoi:lv==='whole',
      lampsOut:(lv&&lv!=='whole'&&lv!=='other')?lv:'',
      lampsOther:lv==='other'?wrap.querySelector('#rp_lampsother').value.trim():'',
      area:wrap.querySelector('#rp_area').value.trim(),
      desc:wrap.querySelector('#rp_desc').value.trim(),

      createdAt:createdAt,
      updatedAt:new Date().toISOString(),
      doneAt:editing?r0.doneAt:undefined,
      history:editing?(r0.history||[]):[{status:'new',at:createdAt}]
    };
    await saveRepair(rec);wrap.remove();toast(editing?'บันทึกการแก้ไขแล้ว':'บันทึกเรื่องแจ้งซ่อมแล้ว');render();
  };
}

/* ============ ใบสั่งงานช่าง ============ */
function repairLampText(r){
  if(r.wholeSoi)return 'ดับทั้งซอย';
  if(r.lampsOther)return r.lampsOther;
  if(r.lampsOut)return r.lampsOut+' ดวง';
  return 'ไม่ระบุ';
}
function mooOrder(p){
  const n=parseInt(String((p&&p.moo)||'').replace(/\D/g,''));
  return isNaN(n)?999:n;
}
function renderWorkOrder(){
  if(!EDIT_MODE){toast('ต้องใส่ PIN ก่อน');location.hash='#/dashboard';return;}
  const app=document.getElementById('app');
  // งานที่ต้องซ่อม = รับเรื่องแล้ว ยังไม่เสร็จ (ไม่รวม pending ที่ยังไม่รับเรื่อง)
  const jobs=REPAIRS.filter(r=>['new','check','waiting','progress'].includes(r.status));
  // จัดกลุ่มตามหมู่
  const groups={};
  jobs.forEach(r=>{
    const p=POINTS.find(x=>x.id===r.pointId);
    const key=(p&&(p.moo||p.group))||'ไม่ระบุหมู่';
    if(!groups[key])groups[key]={order:mooOrder(p),items:[]};
    groups[key].items.push({r,p});
  });
  const keys=Object.keys(groups).sort((a,b)=>groups[a].order-groups[b].order||a.localeCompare(b,'th'));
  keys.forEach(k=>groups[k].items.sort((x,y)=>
    (x.p?.pointName||'').localeCompare(y.p?.pointName||'','th') ||
    (x.r.createdAt||'').localeCompare(y.r.createdAt||'')));

  const today=new Date().toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});

        <div class="wo-header">
          <div style="font-weight:800;font-size:17px">ใบสั่งงานซ่อมไฟฟ้าสาธารณะ</div>
          <div style="font-size:12.5px;color:var(--ink-soft);margin-top:2px">เทศบาลตำบลห้วยใหญ่ · พิมพ์วันที่ ${today} · งานค้างทั้งหมด ${jobs.length} รายการ</div>
        </div>
        ${!jobs.length?'<div class="empty"><div class="big">✅</div>ไม่มีงานค้าง</div>':''}
        ${keys.map(k=>{
          const chunks=[];
          for(let c=0;c<groups[k].items.length;c+=4)chunks.push(groups[k].items.slice(c,c+4));
          return chunks.map((chunk,ci)=>`
          <div class="wo-page">
          <div class="wo-moo">
            <div class="wo-moo-title">${esc(k)} <span style="font-weight:400;font-size:12px">(${groups[k].items.length} งาน${chunks.length>1?` · หน้า ${ci+1}/${chunks.length}`:''})</span></div>
            <div class="wo-grid">
            ${chunk.map(({r,p},ii)=>{
              const i=ci*4+ii;
              const sm=statusMeta(r.status);
              const pole=(p&&r.poleId)?(p.poles||[]).find(x=>x.id===r.poleId):null;
              const photos=(r.photos||[]).filter(Boolean);
              return `
              <div class="wo-item">
                <div class="wo-item-head">
                  <div style="font-weight:700;font-size:14.5px">${i+1}. ${esc(p?p.pointName:'-')}</div>
                  <span class="wo-status" style="background:${sm.c}1A;color:${sm.c};border:1px solid ${sm.c}">${sm.label}</span>
                </div>
                <table class="wo-table">
                  <tr><th>วันที่แจ้ง</th><td>${fmtDate(r.createdAt)}</td></tr>
                  <tr><th>ชื่อผู้แจ้ง</th><td>${esc(r.reporterName||'-')}</td></tr>
                  <tr><th>เบอร์โทร</th><td class="mono">${esc(r.reporterPhone||'-')}</td></tr>
                  <tr><th>สถานที่</th><td>${esc((p?(p.moo||p.group||''):''))}${p&&p.area?' '+esc(p.area):''} · ${esc(p?p.pointName:'-')}</td></tr>
                  <tr><th>จุดสังเกต</th><td>${esc(r.area||'-')}</td></tr>
                  <tr><th>เสาต้นที่</th><td>${pole?esc(pole.label||'-'):'-'}</td></tr>

function parseFbConfig(text){
  const t=text.trim();
  // หา object ที่มี apiKey อยู่ข้างใน โดยนับวงเล็บให้สมดุล
  function objectsIn(str){
    const out=[];
    for(let i=0;i<str.length;i++){
      if(str[i]!=='{')continue;
      let depth=0;
      for(let j=i;j<str.length;j++){
        if(str[j]==='{')depth++;
        else if(str[j]==='}'){depth--;if(depth===0){out.push(str.slice(i,j+1));i=j;break;}}
      }
    }
    return out;
  }
  const cands=objectsIn(t).filter(o=>/apiKey/.test(o));
  if(!cands.length)throw new Error('ไม่พบ apiKey ในข้อความที่วาง');
  const raw=cands.sort((a,b)=>b.length-a.length)[0];
  let cfg=null;
  try{cfg=JSON.parse(raw);}catch(e){
    const fixed=raw
      .replace(/\/\/.*$/gm,'')
      .replace(/([{,]\s*)([A-Za-z_$][A-Za-z0-9_$]*)\s*:/g,'$1"$2":')
      .replace(/'/g,'"')
      .replace(/,(\s*[}\]])/g,'$1');
    cfg=JSON.parse(fixed);
  }
  if(!cfg.apiKey)throw new Error('config ไม่มี apiKey');
  if(!cfg.projectId)throw new Error('config ไม่มี projectId');
  return cfg;
}

/* ============ map ============ */
let mapObj=null;
function renderMap(){
  const app=document.getElementById('app');
  const totalPoles=POINTS.reduce((s,p)=>s+((p.poles||[]).filter(x=>x.lat&&x.lng).length),0);
  const soiGeo=POINTS.filter(p=>p.lat&&p.lng);
  const hasAny=totalPoles>0||soiGeo.length>0;
  app.innerHTML=`
    <div class="topbar">
      <div class="eyebrow">แผนผังตำแหน่งเสาไฟ</div>
      <h1>แผนที่โคมไฟถนน</h1>
      <p>${totalPoles} เสาไฟ · ${soiGeo.length} จุดกลางซอย</p>
    </div>
    <div class="content">
      <div class="action-row" style="margin-top:0;margin-bottom:10px">
        <button class="btn btn-outline btn-sm" id="m_sat">🛰️ ดาวเทียม</button>
        <button class="btn btn-outline btn-sm" id="m_track">📡 ตำแหน่งฉัน</button>
        <button class="btn btn-outline btn-sm" id="m_gmap">🗺️ Google Maps</button>
      </div>
      <div class="action-row" style="margin-top:0;margin-bottom:10px">
        <button class="btn btn-primary btn-sm" id="m_printsel">🖨️ พิมพ์แผนที่/รายการ (เลือกได้)</button>
      </div>
      <div id="fullmap"></div>
      <div id="trackInfo" style="display:none;font-size:12px;text-align:center;margin-top:8px;padding:8px;background:var(--surface);border:1px solid var(--line);border-radius:10px"></div>
      <div class="map-legend">
        <span><span class="lg-dot" style="background:#E8A33D"></span>โซเดียม</span>
        <span><span class="lg-dot" style="background:#3FA7B5"></span>เมทัลฮาไลค์</span>
        <span><span class="lg-dot" style="background:#7C6BD8"></span>LED</span>
        <span><span class="lg-dot" style="background:#C94C4C;border:2px solid #fff"></span>มีแจ้งซ่อมค้าง</span>
        <span><span style="display:inline-block;width:16px;height:3px;background:#E01B24"></span>แนวเสาในซอยเดียวกัน</span>
      </div>
      ${!hasAny?'<div class="hint" style="margin-top:12px">ยังไม่มีพิกัด · เปิดจุดใดจุดหนึ่งแล้วกด "เพิ่มเสา (GPS)"</div>':''}
    </div>`;
  setTimeout(()=>{
    const el=document.getElementById('fullmap');if(!el)return;
    if(mapObj){mapObj.remove();mapObj=null;}
    const firstPoint=totalPoles?POINTS.find(p=>(p.poles||[]).some(x=>x.lat&&x.lng)):null;
    const first=firstPoint?firstPoint.poles.find(x=>x.lat&&x.lng):(soiGeo[0]||null);
    const center=first?[+first.lat,+first.lng]:[12.9236,100.8825];
    mapObj=L.map(el).setView(center,hasAny?16:13);
    const streets=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(mapObj);
    const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'© Esri'});
    let satOn=false;
    document.getElementById('m_sat').onclick=()=>{
      satOn=!satOn;
      if(satOn){mapObj.removeLayer(streets);sat.addTo(mapObj);document.getElementById('m_sat').textContent='🗺️ แผนที่ถนน';}
      else{mapObj.removeLayer(sat);streets.addTo(mapObj);document.getElementById('m_sat').textContent='🛰️ ดาวเทียม';}
    };

    const grp=[];
    POINTS.forEach(p=>{
      const open=openRepairsFor(p.id).length;
      const col=typeColor(p.lampType);
      const poles=(p.poles||[]).filter(x=>x.lat&&x.lng);
      if(poles.length){
        const line=[];
        poles.forEach(pole=>{
          const idx=(p.poles||[]).indexOf(pole)+1;
          const pcol=poleColor(p,pole);
          const icon=L.divIcon({className:'',html:`<div class="leaflet-div-marker" style="width:20px;height:20px;background:${pcol};color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:monospace;${open?'box-shadow:0 0 0 3px #C94C4C, 0 1px 4px rgba(0,0,0,.3);':''}">${idx}</div>`,iconSize:[20,20],iconAnchor:[10,10]});
          L.marker([+pole.lat,+pole.lng],{icon}).addTo(mapObj).bindPopup(`<b>${esc(p.pointName)}</b> · ${esc(pole.label||('เสา '+idx))}<br>${esc(p.moo||p.group||'')}<br>${esc(poleLampLabel(p,pole))}${open?`<br><span style="color:#C94C4C">⚠ แจ้งซ่อมค้าง ${open}</span>`:''}<br><a href="https://www.google.co.th/maps/dir/?api=1&destination=${pole.lat},${pole.lng}" target="_blank">นำทาง ›</a> · <a href="${pointUrl(p.id)}">ข้อมูลซอย ›</a>`);
          line.push([+pole.lat,+pole.lng]);
          grp.push([+pole.lat,+pole.lng]);
        });
        // เส้นสีแดงเชื่อมเสาในซอยเดียวกัน
        if(line.length>1)L.polyline(line,{color:'#E01B24',weight:3,opacity:.85}).addTo(mapObj)
          .bindPopup(`<b>${esc(p.pointName)}</b><br>แนวเสา ${line.length} ต้น`);
      }else if(p.lat&&p.lng){
        const icon=L.divIcon({className:'',html:`<div class="leaflet-div-marker" style="width:18px;height:18px;background:${col};${open?'box-shadow:0 0 0 3px #C94C4C, 0 1px 4px rgba(0,0,0,.3);':''}"></div>`,iconSize:[18,18],iconAnchor:[9,9]});
        L.marker([+p.lat,+p.lng],{icon}).addTo(mapObj).bindPopup(`<b>${esc(p.pointName)}</b><br>${esc(p.moo||p.group||'')}<br>${lampLabel(p)} · ${lampCount(p)} โคม${open?`<br><span style="color:#C94C4C">⚠ แจ้งซ่อมค้าง ${open}</span>`:''}<br><a href="${pointUrl(p.id)}">เปิดข้อมูล ›</a>`);
        grp.push([+p.lat,+p.lng]);
      }
    });
    if(grp.length>1)mapObj.fitBounds(grp,{padding:[40,40]});

    /* ===== ติดตามตำแหน่งแบบเรียลไทม์ ===== */
    let meMarker=null, meCircle=null, watchId=null, lastFix=null;
    const trackBtn=document.getElementById('m_track');
    const info=document.getElementById('trackInfo');

    function stopTrack(){
      if(watchId!=null){navigator.geolocation.clearWatch(watchId);watchId=null;}
      if(meMarker){mapObj.removeLayer(meMarker);meMarker=null;}
      if(meCircle){mapObj.removeLayer(meCircle);meCircle=null;}
      trackBtn.textContent='📡 ตำแหน่งฉัน';trackBtn.style.background='';trackBtn.style.color='';
      info.style.display='none';
    }
    function startTrack(){
      if(!navigator.geolocation){toast('อุปกรณ์ไม่รองรับ GPS');return;}
      trackBtn.textContent='⏹️ หยุดติดตาม';trackBtn.style.background='var(--ok)';trackBtn.style.color='#fff';
      info.style.display='block';info.innerHTML='กำลังจับสัญญาณ...';
      let first=true;
      watchId=navigator.geolocation.watchPosition(pos=>{
        const ll=[pos.coords.latitude,pos.coords.longitude];
        const acc=Math.round(pos.coords.accuracy);
        lastFix={lat:ll[0],lng:ll[1]};
        const icon=L.divIcon({className:'',html:'<div style="width:16px;height:16px;border-radius:50%;background:#1E88E5;border:3px solid #fff;box-shadow:0 0 0 2px rgba(30,136,229,.4),0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[16,16],iconAnchor:[8,8]});
        if(meMarker)meMarker.setLatLng(ll);else meMarker=L.marker(ll,{icon,zIndexOffset:1000}).addTo(mapObj);
        if(meCircle)meCircle.setLatLng(ll).setRadius(acc);
        else meCircle=L.circle(ll,{radius:acc,color:'#1E88E5',fillColor:'#1E88E5',fillOpacity:.12,weight:1}).addTo(mapObj);
        if(first){mapObj.setView(ll,18);first=false;}
        const good=acc<=15;
        info.innerHTML=`<b style="color:${good?'var(--ok)':'var(--warn)'}">±${acc} เมตร</b> · <span class="mono" style="font-size:11px">${ll[0].toFixed(6)}, ${ll[1].toFixed(6)}</span>`;
      },err=>{
        info.innerHTML='<span style="color:var(--danger)">เข้าถึงตำแหน่งไม่ได้</span>';
      },{enableHighAccuracy:true,maximumAge:0,timeout:20000});
    }
    trackBtn.onclick=()=>{watchId==null?startTrack():stopTrack();};

    /* เปิด Google Maps โดยตรง (นำทาง/ดูตำแหน่งจริง) */
    document.getElementById('m_printsel').onclick=openPrintSelect;
    document.getElementById('m_gmap').onclick=()=>{
      if(lastFix){
        window.open('https://www.google.co.th/maps/search/?api=1&query='+lastFix.lat+','+lastFix.lng,'_blank');
      }else if(navigator.geolocation){
        toast('กำลังหาตำแหน่ง...');
        navigator.geolocation.getCurrentPosition(pos=>{
          window.open('https://www.google.co.th/maps/search/?api=1&query='+pos.coords.latitude+','+pos.coords.longitude,'_blank');
        },()=>{window.open('https://www.google.co.th/maps','_blank');},{enableHighAccuracy:true,timeout:10000});
      }else window.open('https://www.google.co.th/maps','_blank');
    };
  },60);
}

/* ============ report / summary ============ */
function thaiMonth(ym){
  const[y,m]=ym.split('-').map(Number);
  const names=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return names[m-1]+' '+(y+543);
}
function renderReport(){
  if(!EDIT_MODE){toast('ต้องใส่ PIN เข้าสู่โหมดแก้ไขก่อน');location.hash='#/dashboard';return;}
  const app=document.getElementById('app');
  // lamp totals
  const totalLamps=POINTS.reduce((s,p)=>s+lampCount(p),0);
  const byType={sodium:0,metal:0,led:0,other:0};
  POINTS.forEach(p=>byType[p.lampType]=(byType[p.lampType]||0)+lampCount(p));
  const byWatt={};POINTS.forEach(p=>{const bd=poleBreakdown(p);if(Object.keys(bd).length){Object.keys(bd).forEach(k=>byWatt[k]=(byWatt[k]||0)+bd[k]);}else{const w=lampLabel(p)||'ไม่ระบุ';byWatt[w]=(byWatt[w]||0)+lampCount(p);}});
  // per group summary
  const byGroup={};POINTS.forEach(p=>{const g=p.group||'ไม่ระบุ';if(!byGroup[g])byGroup[g]={points:0,lamps:0};byGroup[g].points++;byGroup[g].lamps+=lampCount(p);});
  const gnames=Object.keys(byGroup).sort();
  // monthly repair summary
  const months={};
  REPAIRS.forEach(r=>{
    const ym=(r.createdAt||'').slice(0,7);if(!ym)return;
    if(!months[ym])months[ym]={total:0,done:0,open:0,lampsOut:0,wholeSoi:0,list:[]};
    months[ym].total++;months[ym].list.push(r);
    if(r.status==='done')months[ym].done++;else months[ym].open++;
    if(r.wholeSoi)months[ym].wholeSoi++;
    else months[ym].lampsOut+=(+r.lampsOut||0);
  });
  const mkeys=Object.keys(months).sort().reverse();

  app.innerHTML=`
    <div class="topbar">
      <a class="back-link" href="#/dashboard">‹ กลับแดชบอร์ด</a>
      <div class="eyebrow">รายงานสรุป</div>
      <h1>สรุปโคมไฟ & การซ่อมรายเดือน</h1>
    </div>
    <div class="content">
      <div class="action-row no-print" style="margin-bottom:8px">
        <button class="btn btn-primary" onclick="doPrint()">🖨️ พิมพ์ / PDF</button>
        <button class="btn btn-outline" onclick="exportExcel()">📊 ส่งออก Excel</button>
      </div>
      <div class="section-label no-print">ส่งออกสำหรับงานเขียนแบบ</div>
      <div class="action-row no-print" style="margin-top:0">
        <button class="btn btn-outline" onclick="exportDXF(true)">📐 DXF + Attribute</button>
        <button class="btn btn-outline" onclick="exportDXF(false)">📐 DXF แบบง่าย</button>
      </div>
      <div class="action-row no-print" style="margin-top:0;margin-bottom:6px">
        <button class="btn btn-outline" onclick="exportUTMCsv()">📄 CSV พิกัด UTM</button>
        <button class="btn btn-outline" onclick="exportKML()">🌏 KML (Google Earth)</button>
      </div>
      <div class="hint no-print" style="margin-bottom:14px;line-height:1.7">
        <b>DXF + Attribute</b> — เสาเป็น block มีข้อมูลแนบ ใช้ DATAEXTRACTION ดึงเป็นตารางใน AutoCAD ได้<br>
        <b>DXF แบบง่าย</b> — ถ้าโปรแกรมเก่าอ่าน block ไม่ได้<br>
        <b>KML</b> — เปิดใน Google Earth / QGIS / MAPIMPORT

      <div class="section-label">สรุปโคมไฟทั้งหมด</div>
      <div class="stat-grid">
        <div class="stat"><div class="num">${POINTS.length}</div><div class="lbl">จุด/ซอย</div></div>
        <div class="stat"><div class="num">${totalLamps}</div><div class="lbl">โคมรวม</div></div>
        <div class="stat full"><div class="num">${POINTS.reduce((s,p)=>s+((p.poles||[]).length),0)}</div><div class="lbl">เสาไฟที่บันทึกพิกัดรายต้น</div></div>
      </div>
      <div class="bars" style="margin-top:10px">
        ${[['sodium','โซเดียม'],['metal','เมทัลฮาไลค์'],['led','LED'],['other','อื่นๆ']].map(([k,l])=>byType[k]?`
          <div class="bar-row"><div class="bl">${l}</div><div class="bar-track"><div class="bar-fill" style="width:${byType[k]/Math.max(1,totalLamps)*100}%;background:${typeColor(k)}"></div></div><div class="bv">${byType[k]}</div></div>`:'').join('')}

        ${Object.keys(byWatt).sort().map(w=>`<div class="bar-row"><div class="bl">${esc(w)}${/^\d+$/.test(w)?'W':''}</div><div class="bar-track"><div class="bar-fill" style="width:${byWatt[w]/Math.max(1,totalLamps)*100}%;background:var(--ink-soft)"></div></div><div class="bv">${byWatt[w]}</div></div>`).join('')}
      </div>

      <div class="section-label">สรุปตามสาย / ถนน</div>
      <div class="bars">

            <div class="mono" style="font-size:12px;color:var(--ink-soft)">แจ้ง ${d.total} · เฉลี่ย ${avgRepairDays(d.list)!=null?avgRepairDays(d.list)+' วัน':'—'}</div>

          <div class="stat-grid">

            <div class="stat" style="padding:10px"><div class="num" style="font-size:20px;color:var(--danger)">${d.open}</div><div class="lbl">ยังค้าง</div></div>

            <div class="stat" style="padding:10px"><div class="num" style="font-size:20px">${d.wholeSoi}</div><div class="lbl">เคสดับทั้งซอย</div></div>

      <div id="invList"></div>
    </div>
    <button class="fab edit-only" onclick="showItemForm(null)">+</button>`;
  const el=document.getElementById('invList');
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="big">📦</div>ยังไม่มีวัสดุในคลัง${EDIT_MODE?' · กด + เพื่อเพิ่ม':''}</div>`;return;}
  el.innerHTML=rows.map(({it,s,short})=>{
    const unit=it.unit||'ดวง';
    const pct=s.in?Math.round(s.remaining/s.in*100):0;
    const spec=[it.lampType?typeMeta(it.lampType).label:'',it.watt?it.watt+' วัตต์':''].filter(Boolean).join(' ');
    return `<a class="row" href="#/inv/${it.id}" style="align-items:stretch">
      <div class="info">
        <div class="name">${esc(it.name)}${spec?` <span style="font-weight:400;color:var(--ink-soft);font-size:13px">(${esc(spec)})</span>`:''}</div>
        <div class="meta">รับเข้า ${s.in} · ใช้ไป ${s.out} · <b style="color:var(--ink)">คงเหลือ ${s.remaining} ${esc(unit)}</b></div>
        <div class="bar-track" style="height:7px;margin-top:6px"><div class="bar-fill" style="width:${pct}%;background:${short>0?'var(--danger)':'var(--ok)'}"></div></div>
      </div>
      <div class="rt">
        ${short>0?`<span class="mini-badge st-new">ขาด ${short}</span>`:`<span class="mini-badge st-done">พอ</span>`}
        <span class="chev">›</span>
      </div>
    </a>`;}).join('');
}

function renderInvDetail(id){
  const app=document.getElementById('app');
  const it=itemById(id);
  if(!it){app.innerHTML=`<div class="content"><div class="empty">ไม่พบวัสดุนี้<br><a class="btn btn-outline" href="#/inventory" style="margin-top:12px">กลับคลัง</a></div></div>`;return;}
  const s=itemStats(id);
  const unit=it.unit||'ดวง';
  const short=Math.max(0,(+it.needed||0)-s.remaining);
  const txs=TX.filter(t=>t.itemId===id).sort((a,b)=>(b.at||'').localeCompare(a.at||''));
  // usage by point
  const byPoint={};
  txs.filter(t=>t.kind==='out'&&t.pointId).forEach(t=>{byPoint[t.pointId]=(byPoint[t.pointId]||0)+(+t.qty||0);});
  const usageRows=Object.keys(byPoint).map(pid=>{const p=POINTS.find(x=>x.id===pid);return{name:p?p.pointName:'(ไม่ระบุจุด)',group:p?p.group:'',qty:byPoint[pid]};}).sort((a,b)=>b.qty-a.qty);

  app.innerHTML=`
    <div class="topbar">
      <a class="back-link" href="#/inventory">‹ กลับคลังวัสดุ</a>
      <h1>${esc(it.name)}</h1>
      <p>${it.lampType?typeMeta(it.lampType).label+' ':''}${it.watt?it.watt+'W ':''}· หน่วย: ${esc(unit)}</p>
    </div>
    <div class="content">
      <div class="stat-grid">
        <div class="stat"><div class="num">${s.in}</div><div class="lbl">รับเข้าทั้งหมด</div></div>
        <div class="stat accent-metal"><div class="num">${s.out}</div><div class="lbl">เบิกใช้ไป</div></div>
        <div class="stat accent-sodium"><div class="num">${s.remaining}</div><div class="lbl">คงเหลือ</div></div>
        <div class="stat ${short>0?'accent-danger':''}"><div class="num">${short}</div><div class="lbl">ขาด (ต้องเติม)</div></div>
      </div>
      ${it.needed?`<div class="hint" style="margin-top:10px">จำนวนที่ควรมีในคลัง (ขั้นต่ำ): <b>${it.needed} ${esc(unit)}</b>${short>0?` · <span style="color:var(--danger)">ต้องเติมอีก ${short}</span>`:' · เพียงพอ'}</div>`:''}

      <div class="action-row edit-only">
        <button class="btn btn-ok" onclick="showTxForm('${id}','in')">➕ รับเข้า</button>
        <button class="btn btn-primary" onclick="showTxForm('${id}','out')">➖ เบิกใช้</button>
      </div>
      <div class="action-row edit-only">
        <button class="btn btn-outline btn-sm" onclick="showItemForm('${id}')">✏️ แก้ไขวัสดุ</button>
        <button class="btn btn-danger btn-sm" id="delItem">🗑 ลบวัสดุ</button>
      </div>

      <div class="section-label">ใช้ที่จุดไหนบ้าง</div>
      <div id="usageWrap"></div>

      <div class="section-label">ประวัติรับเข้า-เบิกใช้ (${txs.length})</div>
      <div id="txWrap"></div>
    </div>`;
  document.getElementById('delItem').onclick=async()=>{if(confirm('ลบวัสดุ "'+it.name+'" และประวัติทั้งหมด?')){await delItem(id);toast('ลบแล้ว');location.hash='#/inventory';}};

  const uw=document.getElementById('usageWrap');
  uw.innerHTML=usageRows.length?usageRows.map(u=>`<div class="row" style="cursor:default"><div class="info"><div class="name">${esc(u.name)}</div><div class="meta">${esc(u.group||'')}</div></div><span class="count">${u.qty} ${esc(unit)}</span></div>`).join(''):`<div class="hint">ยังไม่มีการเบิกใช้ที่จุดใด</div>`;

  const tw=document.getElementById('txWrap');
  tw.innerHTML=txs.length?txs.map(t=>{
    const p=t.pointId?POINTS.find(x=>x.id===t.pointId):null;
    const isin=t.kind==='in';
    return `<div class="rep-card ${isin?'st-done':'st-progress'}" style="border-left-color:${isin?'var(--ok)':'var(--metal)'}">
      <div class="rep-top">
        <div><div class="rep-pt">${isin?'รับเข้า':'เบิกใช้'} ${t.qty} ${esc(unit)}</div><div class="rep-meta">${fmtDate(t.at)}${p?' · '+esc(p.pointName):''}</div></div>
        <span class="rep-status" style="background:${isin?'var(--sodium-soft)':'var(--metal-soft)'};color:${isin?'#8A5A16':'#1E6E79'}">${isin?'+ '+t.qty:'- '+t.qty}</span>
      </div>
      ${t.spot?`<div class="rep-meta" style="margin-top:3px">📍 ${esc(t.spot)}</div>`:''}
      ${t.note?`<div class="rep-desc">${esc(t.note)}</div>`:''}
      <div class="edit-only" style="text-align:right;margin-top:6px">
        <button class="btn btn-outline btn-sm" data-edittx="${t.id}" data-kind="${t.kind}" style="padding:5px 10px;font-size:11.5px;margin-right:6px">✏️ แก้ไข</button>
        <button class="btn btn-outline btn-sm" data-deltx="${t.id}" style="padding:5px 10px;font-size:11.5px">ลบรายการนี้</button>
      </div>
    </div>`;}).join(''):`<div class="hint">ยังไม่มีประวัติ</div>`;
  tw.querySelectorAll('[data-edittx]').forEach(b=>b.onclick=()=>showTxForm(null,b.dataset.kind,b.dataset.edittx));
  tw.querySelectorAll('[data-deltx]').forEach(b=>b.onclick=async()=>{if(confirm('ลบรายการนี้?')){await delTx(b.dataset.deltx);toast('ลบแล้ว');renderInvDetail(id);}});
}

  wrap.innerHTML=`<div style="background:#fff;width:100%;max-width:760px;border-radius:18px 18px 0 0;padding:20px 16px 24px;max-height:88vh;overflow:auto">
    <div style="font-weight:700;font-size:16px;margin-bottom:14px">${editing?'แก้ไขวัสดุ':'เพิ่มวัสดุใหม่'}</div>
    <div class="field"><label>ชื่อวัสดุ/อุปกรณ์</label><input type="text" id="it_name" value="${esc(it.name)}" placeholder="เช่น หลอดโซเดียม 250W / บัลลาสต์ / สายไฟ"></div>
    <div class="two-col">
      <div class="field"><label>ประเภท (ถ้าเป็นหลอด)</label>
        <select id="it_type" style="width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);font-size:15px">
          <option value="">— ไม่ระบุ —</option>
          <option value="sodium" ${it.lampType==='sodium'?'selected':''}>โซเดียม</option>
          <option value="metal" ${it.lampType==='metal'?'selected':''}>เมทัลฮาไลค์</option>
          <option value="led" ${it.lampType==='led'?'selected':''}>LED</option>
          <option value="other" ${it.lampType==='other'?'selected':''}>อื่นๆ</option>
        </select></div>
      <div class="field"><label>วัตต์</label><input type="text" id="it_watt" value="${esc(it.watt)}" placeholder="250"></div>
    </div>
    <div class="two-col">
      <div class="field"><label>หน่วยนับ</label><input type="text" id="it_unit" value="${esc(it.unit||'ดวง')}" placeholder="ดวง / ตัว / เมตร"></div>
      <div class="field"><label>ควรมีขั้นต่ำ (ไว้คำนวณของขาด)</label><input type="number" id="it_needed" min="0" value="${esc(it.needed)}" placeholder="เช่น 30"></div>
    </div>
    <div class="action-row"><button class="btn btn-outline" id="it_cancel">ยกเลิก</button><button class="btn btn-ok" id="it_save">บันทึก</button></div>
  </div>`;
  document.body.appendChild(wrap);
  wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.querySelector('#it_cancel').onclick=()=>wrap.remove();
  wrap.querySelector('#it_save').onclick=async()=>{
    const name=wrap.querySelector('#it_name').value.trim();
    if(!name){toast('กรุณาใส่ชื่อวัสดุ');return;}
    const rec={id:it.id,name,lampType:wrap.querySelector('#it_type').value,watt:wrap.querySelector('#it_watt').value.trim(),unit:wrap.querySelector('#it_unit').value.trim()||'ดวง',needed:wrap.querySelector('#it_needed').value};
    await saveItem(rec);wrap.remove();toast('บันทึกแล้ว');
    if(location.hash.startsWith('#/inv/'))renderInvDetail(it.id);else renderInventory();
  };
}

function showTxForm(itemId,kind,txId){
  const editing=!!txId;
  const t0=editing?TX.find(x=>x.id===txId):null;
  if(editing&&!t0)return;
  const curItem=editing?t0.itemId:itemId;
  const curKind=editing?t0.kind:kind;
  const isin=curKind==='in';
  const it=itemById(curItem);
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;background:rgba(27,36,48,.55);z-index:50;display:flex;align-items:flex-end;justify-content:center;';
  const base=editing&&t0.at?new Date(t0.at):new Date();
  const isoDate=base.toISOString().slice(0,10);
  const itemOpts=INV.map(x=>`<option value="${x.id}" ${x.id===curItem?'selected':''}>${esc(x.name)}</option>`).join('');
  // location options grouped by moo
  const sorted=POINTS.slice().sort((a,b)=>(a.group||'').localeCompare(b.group||'','th')||(a.pointName||'').localeCompare(b.pointName||'','th'));
  const byMoo={};sorted.forEach(p=>{const k=p.moo||p.group||'ไม่ระบุ';(byMoo[k]=byMoo[k]||[]).push(p);});
  const curPoint=editing?(t0.pointId||''):'';
  const locOpts=Object.keys(byMoo).map(k=>`<optgroup label="${esc(k)}">${byMoo[k].map(p=>`<option value="${p.id}" ${p.id===curPoint?'selected':''}>${esc(p.pointName)}</option>`).join('')}</optgroup>`).join('');

  wrap.innerHTML=`<div style="background:#fff;width:100%;max-width:760px;border-radius:18px 18px 0 0;padding:20px 16px 24px;max-height:90vh;overflow:auto">
    <div style="font-weight:700;font-size:16px;margin-bottom:2px">${editing?(isin?'แก้ไขรายการรับเข้า':'แก้ไขรายการเบิกใช้'):(isin?'รับเข้าคลัง':'เบิกใช้')}</div>
    <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:14px">${esc(it?it.name:'')} · คงเหลือ ${it?itemStats(curItem).remaining:0} ${esc(it?(it.unit||'ดวง'):'')}</div>

    <div class="field"><label>วันที่</label>
      <input type="date" id="tx_date" value="${isoDate}" style="width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);font-family:'Sarabun',sans-serif;font-size:15px"></div>

    <div class="field"><label>รายการวัสดุ</label>
      <select id="tx_item" style="width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);font-size:15px">${itemOpts}</select></div>

    <div class="field"><label>จำนวนที่ใช้</label>
      <input type="number" id="tx_qty" min="1" value="${editing?esc(t0.qty):''}" placeholder="เช่น ${isin?'30':'2'}"></div>

    ${!isin?`<div class="field"><label>ใช้บริเวณไหน (หมู่ / ซอย)</label>
      <select id="tx_point" style="width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);font-size:15px">
        <option value="">— ไม่ระบุจุด —</option>${locOpts}
      </select></div>
    <div class="field"><label>จุดสังเกต / บริเวณเพิ่มเติม</label>
      <input type="text" id="tx_spot" value="${editing?esc(t0.spot||''):''}" placeholder="เช่น เสาต้นที่ 4 หัวมุมซอย"></div>`:''}

    <div class="field"><label>หมายเหตุ</label>
      <input type="text" id="tx_note" value="${editing?esc(t0.note||''):''}" placeholder="${isin?'เช่น ซื้อจากร้าน... / เลขที่ใบส่งของ':'เช่น เปลี่ยนหลอดขาด'}"></div>

    <div class="action-row">
      <button class="btn btn-outline" id="tx_cancel">ยกเลิก</button>
      <button class="btn ${isin?'btn-ok':'btn-primary'}" id="tx_save">${editing?'บันทึกการแก้ไข':'บันทึก'}</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
  makeSearchableAll(wrap,['tx_item'],'🔍 ค้นหาวัสดุ...');
  makeSearchableAll(wrap,['tx_point'],'🔍 ค้นหาหมู่ / ซอย...');
  wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.querySelector('#tx_cancel').onclick=()=>wrap.remove();
  wrap.querySelector('#tx_save').onclick=async()=>{
    const qty=+wrap.querySelector('#tx_qty').value;
    if(!qty||qty<=0){toast('กรุณาใส่จำนวน');return;}
    const newItem=wrap.querySelector('#tx_item').value;
    if(!isin){
      // available = remaining excluding this tx's own current effect (if editing same item)
      let rem=itemStats(newItem).remaining;
      if(editing&&t0.itemId===newItem&&t0.kind==='out')rem+=(+t0.qty||0);
      if(qty>rem&&!confirm('เบิก '+qty+' แต่คงเหลือ '+rem+' ยืนยันหรือไม่?'))return;
    }
    const dateStr=wrap.querySelector('#tx_date').value;
    const at=dateStr?new Date(dateStr+'T'+base.toTimeString().slice(0,8)).toISOString():base.toISOString();
    const rec={
      id:editing?t0.id:uid('t'),
      itemId:newItem,
      kind:curKind,
      qty,
      pointId:isin?'':(wrap.querySelector('#tx_point')?wrap.querySelector('#tx_point').value:''),
      spot:isin?'':(wrap.querySelector('#tx_spot')?wrap.querySelector('#tx_spot').value.trim():''),
      note:wrap.querySelector('#tx_note').value.trim(),
      at:at
    };
    await saveTx(rec);wrap.remove();toast(editing?'บันทึกการแก้ไขแล้ว':'บันทึกแล้ว');
    renderInvDetail(rec.itemId);
  };
}

        <div class="field"><label>จำนวนโคม${(p.poles||[]).length?' (นับจากเสาอัตโนมัติ)':''}</label>
          <input type="number" id="f_count" min="0" value="${(p.poles||[]).length?(p.poles||[]).length:esc(p.count)}" placeholder="เช่น 11" ${(p.poles||[]).length?'readonly style="background:var(--bg);color:var(--ink-soft)"':''}>
          ${(p.poles||[]).length?`<div style="font-size:11px;color:var(--ink-soft);margin-top:5px">มีเสา ${(p.poles||[]).length} ต้น · จำนวนโคมอิงตามเสาที่ปักไว้</div>`:'<div style="font-size:11px;color:var(--ink-soft);margin-top:5px">เมื่อเริ่มปักเสา ระบบจะนับจำนวนโคมจากเสาให้อัตโนมัติ</div>'}
        </div>

        <div class="two-col">
          <div class="field"><label>ละติจูด (lat)</label><input type="text" id="f_lat" value="${esc(p.lat)}" placeholder="12.9236"></div>
          <div class="field"><label>ลองจิจูด (lng)</label><input type="text" id="f_lng" value="${esc(p.lng)}" placeholder="100.8825"></div>
        </div>
        <div class="action-row" style="margin:-4px 0 14px">
          <button type="button" class="btn btn-outline btn-sm" id="geoBtn">📍 ใช้ตำแหน่งปัจจุบัน</button>
          <button type="button" class="btn btn-outline btn-sm" id="pickBtn">🗺️ ปักหมุดบนแผนที่</button>
        </div>

        <div class="field"><label>ลิงก์ Google Maps (ถ้ามี)</label><input type="text" id="f_mapurl" value="${esc(p.mapUrl)}" placeholder="วางลิงก์ที่แชร์จาก Google Maps"></div>

        <div class="field"><label>รูปภาพหน้างาน</label>
          <label class="upload-btn" for="f_photo">📷 ถ่ายรูป / เลือกรูป</label>
          <input type="file" id="f_photo" accept="image/*" capture="environment" multiple style="display:none">
          <div class="thumb-grid" id="thumbs"></div>
        </div>

        <div class="two-col">
          <div class="field"><label>หมายเลขมิเตอร์</label><input type="text" id="f_meter" inputmode="numeric" maxlength="12" value="${esc(p.meterNo)}" placeholder="102-8004-80"></div>
          <div class="field"><label>หมายเลขหม้อแปลง</label><input type="text" id="f_trans" style="text-transform:uppercase" value="${esc(p.transformerNo)}" placeholder="2PEA 48-0514"></div>
        </div>

        <div class="field"><label>หมายเหตุ (รายละเอียดอื่นๆ)</label><textarea id="f_note" placeholder="ใส่รายละเอียดอื่นๆ">${esc(p.note)}</textarea></div>

        <button type="submit" class="btn btn-primary btn-block" id="saveBtn">${editing?'บันทึกการแก้ไข':'บันทึกจุดใหม่'}</button>
      </form>
    </div>`;

  // soi dropdown: reuse saved soi names (prefer same moo, then all)
  function currentMoo(){
    const v=document.getElementById('f_moo').value;
    return v==='อื่นๆ'?document.getElementById('f_moocustom').value.trim():v;
  }
  function fillSoi(){
    const sel=document.getElementById('f_soi');
    const nameIn=document.getElementById('f_name');
    const moo=currentMoo();
    const inMoo=[...new Set(POINTS.filter(x=>x.moo&&x.moo===moo).map(x=>x.pointName).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'th'));
    const others=[...new Set(POINTS.map(x=>x.pointName).filter(Boolean))].filter(n=>!inMoo.includes(n)).sort((a,b)=>a.localeCompare(b,'th'));
    const cur=p.pointName||'';
    const known=inMoo.includes(cur)||others.includes(cur);
    sel.innerHTML=
      `<option value="">— เลือกซอย —</option>`+
      (inMoo.length?`<optgroup label="ซอยใน${esc(moo||'หมู่นี้')}">${inMoo.map(n=>`<option value="${esc(n)}" ${n===cur?'selected':''}>${esc(n)}</option>`).join('')}</optgroup>`:'')+
      (others.length?`<optgroup label="ซอยอื่นที่เคยบันทึก">${others.map(n=>`<option value="${esc(n)}" ${n===cur?'selected':''}>${esc(n)}</option>`).join('')}</optgroup>`:'')+
      `<option value="__new__" ${(cur&&!known)?'selected':''}>➕ เพิ่มซอยใหม่...</option>`;
    if(!POINTS.length&&!cur)sel.value='__new__';
    nameIn.value=cur||nameIn.value||'';
  }
  fillSoi();
  makeSearchableAll(document,['f_soi'],'🔍 ค้นหาชื่อซอย...');
  document.getElementById('f_soi').onchange=e=>{
    const nameIn=document.getElementById('f_name');
    if(e.target.value==='__new__'){nameIn.value='';nameIn.focus();}
    else nameIn.value=e.target.value;
  };
  // moo custom toggle
  document.getElementById('f_moo').onchange=e=>{
    document.getElementById('f_moocustom').style.display=e.target.value==='อื่นๆ'?'block':'none';
    fillSoi();};
  document.getElementById('f_moocustom').oninput=()=>fillSoi();
  // type choice
  document.querySelectorAll('#typeChoice label').forEach(l=>l.onclick=()=>{
    document.querySelectorAll('#typeChoice label').forEach(x=>x.className='');
    l.className='sel sel-'+l.dataset.v;l.querySelector('input').checked=true;
    document.getElementById('f_typeother').style.display=l.dataset.v==='other'?'block':'none';});
  // watt choice
  document.querySelectorAll('#wattChoice label').forEach(l=>l.onclick=()=>{
    document.querySelectorAll('#wattChoice label').forEach(x=>x.className='');
    l.className='selw';l.querySelector('input').checked=true;
    document.getElementById('f_wattcustom').style.display=l.dataset.w==='custom'?'block':'none';});

  // meter: auto dashes 102-8004-80  (3-4-2)
  const meterEl=document.getElementById('f_meter');
  meterEl.oninput=e=>{
    const el=e.target;
    const atEnd=el.selectionStart===el.value.length;
    let d=el.value.replace(/\D/g,'').slice(0,9);
    let out=d.slice(0,3);
    if(d.length>3)out+='-'+d.slice(3,7);
    if(d.length>7)out+='-'+d.slice(7,9);
    el.value=out;
    if(atEnd)el.setSelectionRange(out.length,out.length);
  };
  // transformer: force uppercase
  const transEl=document.getElementById('f_trans');
  transEl.oninput=e=>{
    const el=e.target;const pos=el.selectionStart;
    el.value=el.value.toUpperCase();
    el.setSelectionRange(pos,pos);
  };

  document.getElementById('geoBtn').onclick=async()=>{
    const g=await getLocationSmart(document.getElementById('f_lat').value,document.getElementById('f_lng').value);
    if(!g)return;
    document.getElementById('f_lat').value=g.lat;
    document.getElementById('f_lng').value=g.lng;
  };
  document.getElementById('pickBtn').onclick=async()=>{
    const g=await pickOnMap(document.getElementById('f_lat').value,document.getElementById('f_lng').value);
    if(!g)return;
    document.getElementById('f_lat').value=g.lat;
    document.getElementById('f_lng').value=g.lng;
    toast('เลือกตำแหน่งแล้ว');
  };

  renderThumbs();
  document.getElementById('f_photo').onchange=async e=>{
    const files=[...e.target.files];e.target.value='';
    for(const f of files){
      if(formPhotos.length>=MAX_PHOTOS){toast('แนบได้สูงสุด '+MAX_PHOTOS+' รูป');break;}
      try{
        toast('กำลังบีบอัดรูป...');
        const b64=await compressImage(f);formPhotos.push(b64);renderThumbs();
        toast('เพิ่มรูปแล้ว ('+Math.round(b64Bytes(b64)/1024)+' KB)');
      }catch(err){toast('อ่านรูปไม่สำเร็จ');}
    }
  };

  document.getElementById('pf').onsubmit=async e=>{
    e.preventDefault();
    const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='กำลังบันทึก...';
    const wt=document.querySelector('input[name=wt]:checked');
    let watt=wt?wt.value:'';
    if(watt==='custom')watt=document.getElementById('f_wattcustom').value.trim();
    const lt=document.querySelector('input[name=lt]:checked');
    let moo=document.getElementById('f_moo').value;
    if(moo==='อื่นๆ')moo=document.getElementById('f_moocustom').value.trim();
    const area=document.getElementById('f_area').value.trim();
    if(!moo){toast('กรุณาเลือกหมู่ที่');btn.disabled=false;btn.textContent='บันทึก';return;}
    const pointName=document.getElementById('f_name').value.trim();
    if(!pointName){toast('กรุณาเลือกหรือพิมพ์ชื่อซอย');btn.disabled=false;btn.textContent='บันทึก';return;}
    const rec={
      ...p,                    // เก็บฟิลด์เดิมทั้งหมดไว้ (สำคัญ: poles จะไม่หาย)
      id:p.id,
      moo:moo,area:area,
      group:moo+(area?' '+area:''),
      pointName:pointName,
      poles:(p.poles||[]),     // ย้ำให้ชัดว่าเสาต้องอยู่ครบ
      lampType:lt?lt.value:'sodium',
      lampTypeOther:(lt&&lt.value==='other')?document.getElementById('f_typeother').value.trim():'',
      watt:watt,
      count:document.getElementById('f_count').value,
      lat:document.getElementById('f_lat').value.trim(),
      lng:document.getElementById('f_lng').value.trim(),
      mapUrl:document.getElementById('f_mapurl').value.trim(),
      meterNo:document.getElementById('f_meter').value.trim(),
      transformerNo:document.getElementById('f_trans').value.trim().toUpperCase(),
      photos:formPhotos,   // จะถูกแปลงเป็นลิงก์ด้านล่างถ้าต่อ Storage
      note:document.getElementById('f_note').value.trim()};
    try{
      const fitted=await fitPhotosForSave(rec,m=>{btn.textContent=m;});
      if(fitted._trimmed){
        const lost=rec.photos.length-fitted.photos.length;
        if(!confirm('รูปภาพรวมใหญ่เกินขีดจำกัด\n\nต้องตัดออก '+lost+' รูป จึงจะบันทึกได้\n\nดำเนินการต่อ?')){
          btn.disabled=false;btn.textContent='บันทึก';return;
        }
      }
      delete fitted._trimmed;
      rec.photos=fitted.photos;
      if(FBSTORAGE&&rec.photos.some(isDataUrl)){
        btn.textContent='กำลังอัปโหลดรูป...';
        const r=await materializePhotos(rec.photos,'points',p.id,(i,n)=>{btn.textContent='อัปโหลดรูป '+i+'/'+n+'...';});
        rec.photos=r.photos;
        if(r.failed)toast('อัปโหลดรูปไม่สำเร็จ '+r.failed+' ใบ');
      }
      btn.textContent='กำลังบันทึก...';
      await savePoint(rec);
      toast('บันทึกแล้ว');
      location.hash='#/point/'+p.id;
    }catch(err){
      console.error('savePoint failed:',err,rec);
      const msg=(err&&err.message)?err.message:String(err);
      // ถ้ามีรูปและบันทึกไม่ผ่าน ลองบันทึกใหม่แบบไม่เอารูป
      if(rec.photos&&rec.photos.length){
        try{
          await savePoint({...rec,photos:[]});
          btn.disabled=false;btn.textContent='บันทึกแล้ว (ไม่รวมรูป)';
          alert('บันทึกข้อมูลสำเร็จ แต่บันทึกรูปไม่ได้\n\nสาเหตุ: '+msg+'\n\nลองลดจำนวนรูปหรือใช้รูปที่เล็กลง');
          location.hash='#/point/'+p.id;return;
        }catch(e2){}
      }
      btn.disabled=false;btn.textContent='ลองอีกครั้ง';
      alert('บันทึกไม่สำเร็จ\n\nสาเหตุจริง: '+msg+'\n\nลองกด "ลองอีกครั้ง" อีกรอบ · ถ้ายังไม่ได้ ให้รีเฟรชหน้าแล้วลองใหม่');
    }
  };
}
function renderThumbs(){
  const el=document.getElementById('thumbs');if(!el)return;
  el.innerHTML=formPhotos.map((u,i)=>`<div class="thumb"><img src="${u}"><button type="button" class="rm" data-i="${i}">×</button></div>`).join('');
  el.querySelectorAll('.rm').forEach(b=>b.onclick=()=>{formPhotos.splice(+b.dataset.i,1);renderThumbs();});
}

/* ============ boot ============ */
window.addEventListener('hashchange',render);
(async()=>{
  const chip=document.createElement('div');chip.id='lockChip';chip.onclick=toggleLock;document.body.appendChild(chip);
  document.getElementById('app').innerHTML=`<div class="empty" style="padding-top:120px">กำลังโหลดข้อมูล...</div>`;
  await initDB();
  await loadAll();
  render();
  // สำรองอัตโนมัติเบื้องหลัง (ไม่ขวางการใช้งาน)
  startLiveSync();
  setTimeout(()=>{runAutoBackup().then(r=>{if(r&&r.ok)console.log('auto backup ok',r.key);});},4000);
})();
</script>
</body>
</html>
