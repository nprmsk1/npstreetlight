<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>ทะเบียนโคมไฟถนน · เทศบาลตำบลห้วยใหญ่</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#EEF1F5; --surface:#FFFFFF; --ink:#1B2430; --ink-soft:#5B6472;
    --sodium:#E8A33D; --sodium-soft:#FBEBD2;
    --metal:#3FA7B5; --metal-soft:#DCF1F3;
    --led:#7C6BD8; --led-soft:#E7E3F8;
    --line:#DBE1E9; --danger:#C94C4C; --ok:#3E9E6B; --warn:#E0872B;
    --radius:14px;
  }
  /* status colors */
  .st-pending{--c:#8E5BD8;--cs:#E9E0FA;}
  .st-new{--c:#C94C4C;--cs:#FADCDC;}
  .st-check{--c:#E0872B;--cs:#FBEBD2;}
  .st-waiting{--c:#B4763B;--cs:#F3E4D3;}
  .st-progress{--c:#3FA7B5;--cs:#DCF1F3;}
  .st-done{--c:#3E9E6B;--cs:#DBF0E4;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Sarabun',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:70px;}
  .mono{font-family:'JetBrains Mono',monospace;}
  #app{max-width:760px;margin:0 auto;}

  .topbar{background:var(--ink);color:#fff;padding:20px 18px 22px;position:relative;overflow:hidden;}
  .topbar::after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle, rgba(232,163,61,0.35), transparent 70%);}
  .topbar .eyebrow{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1.6px;color:var(--sodium);text-transform:uppercase;margin-bottom:5px;position:relative;}
  .topbar h1{font-size:19px;margin:0 0 3px;font-weight:800;position:relative;}
  .topbar p{margin:0;font-size:12px;color:#B9C2CE;position:relative;}
  .back-link{display:inline-flex;align-items:center;gap:4px;color:#B9C2CE;font-size:13px;text-decoration:none;margin-bottom:10px;}

  .content{padding:16px 14px 0;}
  .section-label{font-size:12px;font-weight:700;color:var(--ink-soft);margin:20px 2px 8px;letter-spacing:.3px;}

  /* bottom nav */
  .navbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);display:flex;z-index:30;max-width:760px;margin:0 auto;}
  .navbar a{flex:1;text-align:center;padding:9px 0 8px;text-decoration:none;color:var(--ink-soft);font-size:10px;font-weight:600;}
  .navbar a .ic{display:block;font-size:18px;margin-bottom:1px;line-height:1;}
  .navbar a.active{color:var(--ink);}
  .navbar a.active .ic{filter:none;}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:10px;border:none;font-family:'Sarabun',sans-serif;font-weight:600;font-size:14px;cursor:pointer;text-decoration:none;}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-outline{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-ok{background:var(--ok);color:#fff;}
  .btn-block{width:100%;}
  .btn-sm{padding:8px 12px;font-size:13px;}
  .fab{position:fixed;right:18px;bottom:78px;width:54px;height:54px;border-radius:50%;background:var(--sodium);color:var(--ink);font-size:27px;border:none;box-shadow:0 6px 18px rgba(232,163,61,0.5);cursor:pointer;z-index:31;}

  /* dashboard */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;}
  .stat .num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1;}
  .stat .lbl{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .stat.accent-sodium .num{color:var(--sodium);}
  .stat.accent-metal .num{color:var(--metal);}
  .stat.accent-danger .num{color:var(--danger);}
  .stat.full{grid-column:1/-1;}

  .bars{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-row:last-child{margin-bottom:0;}
  .bar-row .bl{width:130px;font-size:12.5px;color:var(--ink-soft);flex-shrink:0;}
  .bar-track{flex:1;height:12px;background:var(--bg);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;}
  .bar-row .bv{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;width:34px;text-align:right;}

  .status-chips{display:flex;gap:8px;flex-wrap:wrap;}
  .status-chip{flex:1;min-width:calc(50% - 4px);border-radius:12px;padding:12px;background:var(--cs);border:1px solid transparent;}
  .status-chip .num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--c);line-height:1;}
  .status-chip .lbl{font-size:11.5px;color:var(--ink);margin-top:3px;font-weight:600;}

  /* toolbar / search */
  .toolbar{display:flex;gap:8px;margin-bottom:12px;}
  .toolbar input[type=text]{flex:1;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-family:'Sarabun',sans-serif;font-size:15px;}
  select{padding:11px 10px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-family:'Sarabun',sans-serif;font-size:13.5px;}

  /* list rows */
  .group-title{font-size:13px;font-weight:700;color:var(--ink-soft);margin:16px 0 8px;padding-left:2px;}
  .row{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;text-decoration:none;color:var(--ink);}
  .row .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .dot.sodium{background:var(--sodium);}.dot.metal{background:var(--metal);}.dot.led{background:var(--led);}.dot.other{background:var(--ink-soft);}
  .row .info{flex:1;min-width:0;}
  .row .name{font-size:14.5px;font-weight:600;}
  .row .meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .row .rt{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .row .count{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;padding:3px 9px;border-radius:8px;background:var(--bg);}
  .mini-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--cs);color:var(--c);}
  .empty{text-align:center;padding:56px 20px;color:var(--ink-soft);}
  .empty .big{font-size:42px;margin-bottom:6px;}

  /* detail tag */
  .tag-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;position:relative;}
  .tag-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .tag-head .id-code{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-soft);letter-spacing:.4px;}
  .tag-head h2{font-size:18px;margin:4px 0 0;}
  .badge{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:7px;white-space:nowrap;}
  .badge.sodium{background:var(--sodium-soft);color:#8A5A16;}
  .badge.metal{background:var(--metal-soft);color:#1E6E79;}
  .badge.led{background:var(--led-soft);color:#4A3E9E;}
  .badge.other{background:var(--bg);color:var(--ink-soft);}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
  .detail-item .k{font-size:11.5px;color:var(--ink-soft);}
  .detail-item .v{font-size:14.5px;font-weight:500;margin-top:1px;}
  .map-embed{width:100%;height:190px;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:12px 0;}
  .photo-strip{display:flex;gap:8px;overflow-x:auto;margin:12px 0;padding-bottom:2px;}
  .photo-strip img{height:110px;border-radius:10px;border:1px solid var(--line);flex-shrink:0;object-fit:cover;}
  .qr-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0 6px;border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);margin:14px 0;}
  .qr-wrap #qrcode,.qr-wrap .qhold{margin-bottom:8px;}
  .qr-wrap .qr-caption{font-size:11px;color:var(--ink-soft);text-align:center;}
  .action-row{display:flex;gap:8px;margin-top:12px;}
  .action-row .btn{flex:1;}
  .note-box{background:var(--bg);border-radius:10px;padding:10px 12px;font-size:13.5px;color:var(--ink-soft);margin-top:10px;}

  /* form */
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field input[type=text],.field input[type=number],.field textarea{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);font-family:'Sarabun',sans-serif;font-size:15px;background:var(--surface);}
  .field textarea{resize:vertical;min-height:58px;}
  .two-col{display:flex;gap:10px;}.two-col .field{flex:1;}
  .choice{display:flex;gap:7px;flex-wrap:wrap;}
  .choice label{flex:1;min-width:auto;display:flex;align-items:center;justify-content:center;gap:5px;border:1.5px solid var(--line);border-radius:10px;padding:10px 6px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);}
  .choice input{display:none;}
  .choice label.sel{color:var(--ink);}
  .choice label.sel-sodium{border-color:var(--sodium);background:var(--sodium-soft);}
  .choice label.sel-metal{border-color:var(--metal);background:var(--metal-soft);}
  .choice label.sel-led{border-color:var(--led);background:var(--led-soft);}
  .choice label.sel-other{border-color:var(--ink-soft);background:var(--bg);}
  .watt-choice label.selw{border-color:var(--ink);background:var(--bg);color:var(--ink);}
  .upload-btn{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--line);border-radius:10px;padding:16px;color:var(--ink-soft);font-size:13.5px;cursor:pointer;font-weight:600;}
  .thumb-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .thumb{position:relative;width:76px;height:76px;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb .rm{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(27,36,48,.8);color:#fff;border:none;font-size:12px;cursor:pointer;line-height:1;}
  .hint{font-size:11.5px;color:var(--ink-soft);line-height:1.6;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px;}

  /* repair */
  .rep-card{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--c);border-radius:12px;padding:13px;margin-bottom:10px;}
  .rep-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .rep-status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--cs);color:var(--c);white-space:nowrap;}
  .rep-pt{font-size:14px;font-weight:600;}
  .rep-meta{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .rep-desc{font-size:13.5px;margin-top:6px;}
  .step-flow{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .step-btn{flex:1;min-width:calc(50% - 3px);padding:8px 4px;border-radius:8px;border:1px solid var(--line);background:var(--surface);font-size:11.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;text-align:center;}
  .step-btn.on{background:var(--c);border-color:var(--c);color:#fff;}

  /* map view */
  #fullmap{width:100%;height:calc(100vh - 210px);min-height:360px;border-radius:var(--radius);border:1px solid var(--line);position:relative;z-index:0;isolation:isolate;}
  #printMap{position:relative;z-index:0;isolation:isolate;}
  /* กันแผนที่ Leaflet ทับกล่องเลือก/ป๊อปอัป/แถบเมนู (Leaflet ตั้ง z-index สูงถึง ~1000) */
  .leaflet-pane,.leaflet-top,.leaflet-bottom,.leaflet-control,.leaflet-control-container{z-index:1!important;}
  .leaflet-popup-pane{z-index:2!important;}
  /* แถบเครื่องมือเหนือแผนที่ ต้องอยู่เหนือแผนที่เสมอ */
  .content .action-row{position:relative;z-index:5;}
  .leaflet-div-marker{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  .map-legend{display:flex;gap:12px;flex-wrap:wrap;margin:10px 2px 0;font-size:12px;color:var(--ink-soft);}
  .map-legend span{display:inline-flex;align-items:center;gap:5px;}
  .lg-dot{width:10px;height:10px;border-radius:50%;}

  /* bulk qr print */
  .qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .qr-cell{border:1px dashed var(--line);border-radius:10px;padding:12px;text-align:center;background:var(--surface);}
  .qr-cell .qhold{display:flex;justify-content:center;}
  .qr-cell .cap{font-size:11px;font-weight:600;margin-top:6px;}
  .qr-cell .sub{font-size:10px;color:var(--ink-soft);}
  @media print{
    .navbar,.fab,.topbar,.section-label,.no-print,#cloudWarn,#lockChip{display:none!important;}
    html,body{padding:0!important;margin:0!important;background:#fff!important;height:auto!important;overflow:visible!important;}
    /* กันเนื้อหาถูกตัด: ปล่อยให้ทุกกล่องยืดเต็มและไหลข้ามหน้าได้ */
    #app,.content,.report-sheet,#woSheet{height:auto!important;max-height:none!important;overflow:visible!important;position:static!important;padding:0!important;margin:0!important;}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .qr-grid{grid-template-columns:1fr 1fr 1fr;}
    .qr-cell{break-inside:avoid;}
  }
  /* ===== ใบสั่งงานช่าง ===== */
  .wo-header{text-align:center;padding:10px 0 16px;border-bottom:2px solid var(--ink);margin-bottom:16px;}
  .wo-moo{margin-bottom:22px;}
  .wo-moo-title{background:var(--ink);color:#fff;padding:8px 12px;border-radius:8px;font-weight:700;font-size:14.5px;margin-bottom:10px;}
  .wo-page{margin-bottom:10px;}
  .wo-grid{display:grid;grid-template-columns:1fr;gap:10px;}
  .wo-item{border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--surface);break-inside:avoid;page-break-inside:avoid;}
  .wo-item-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;}
  .wo-status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .wo-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .wo-table th{text-align:left;width:38%;padding:4px 6px 4px 0;color:var(--ink-soft);font-weight:600;vertical-align:top;}
  .wo-table td{padding:4px 0;vertical-align:top;}
  .wo-table tr{border-bottom:1px solid #F0F2F5;}
  .wo-note{margin-top:8px;padding:8px 10px;border-radius:8px;background:#F3E4D3;border:1px solid #B4763B;color:#6E4519;font-size:12px;font-weight:600;}
  .wo-qr-row{display:flex;gap:12px;align-items:flex-start;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);}
  .wo-qr{text-align:center;}
  .wo-qr-cap{font-size:10px;color:var(--ink-soft);margin-top:4px;max-width:110px;}
  .wo-sign{flex:1;text-align:center;padding-top:26px;}
  .wo-sign-line{border-bottom:1px dotted var(--ink-soft);margin:0 10px;}
  .wo-sign-cap{font-size:11px;color:var(--ink-soft);margin-top:4px;}
  @media print{
    @page{size:A4 portrait;margin:10mm;}
    .wo-moo-title{background:#1B2430 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .wo-note{background:#F3E4D3 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .wo-item{border:1px solid #999;padding:8px;}
    #woSheet{font-size:11px;}
    /* 2 คอลัมน์ ไล่จากซ้ายไปขวา แล้วขึ้นแถวใหม่ */
    .wo-grid{grid-template-columns:1fr 1fr;gap:7px;}
    /* 4 รายการ (2x2) ต่อ 1 หน้า */
    .wo-page{page-break-after:always;break-after:page;}
    .wo-page:last-child{page-break-after:auto;break-after:auto;}
    .wo-moo{margin-bottom:0;}
    .wo-table{font-size:10px;}
    .wo-table th,.wo-table td{padding:1.5px 4px 1.5px 0;}
    .wo-qr-row{margin-top:7px;padding-top:6px;gap:8px;}
    .wo-sign{padding-top:18px;}
    .wo-note{font-size:10.5px;padding:5px 7px;}
  }
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  #cloudWarn{position:sticky;top:0;z-index:40;background:#C94C4C;color:#fff;padding:9px 12px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;line-height:1.5;}
  #cloudWarn a{color:#fff;text-decoration:underline;}
  @media print{#cloudWarn{display:none!important;}}
  #lockChip{position:fixed;top:12px;right:12px;z-index:45;display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:22px;font-size:11.5px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.16);color:#fff;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25);}
  #lockChip.unlocked{background:var(--sodium);color:var(--ink);border-color:var(--sodium);}
  body.viewonly .edit-only{display:none!important;}
  .print-sheet{background:#fff;}
  @media print{
    .print-sheet{font-size:12px;}
    #printMap{height:400px!important;page-break-inside:avoid;}
  }
  @media print{#lockChip{display:none!important;}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ที่เก็บข้อมูล (STORAGE)
   ------------------------------------------------------------
   ค่าเริ่มต้น: localStorage = เก็บในเครื่อง/เบราว์เซอร์ที่เปิดเท่านั้น
   ถ้าอยากให้ทุกคนเห็นข้อมูลชุดเดียวกัน ให้ตั้งค่า Firebase ด้านล่าง
   (ดูขั้นตอนในไฟล์ SETUP.md)
   ============================================================ */
const USE_FIREBASE = true;           // ← ฝัง config ไว้ในไฟล์แล้ว (ไม่ต้องเชื่อมต่อใหม่ทุกครั้ง)
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC09kVgW3x6cvddRurAMt1tKgZ7B3nHKNk",
  authDomain: "lighting-registration-system.firebaseapp.com",
  projectId: "lighting-registration-system",
  storageBucket: "lighting-registration-system.firebasestorage.app",
  messagingSenderId: "436880223751",
  appId: "1:436880223751:web:b5cab8a04a2c98929fc4a2"
};
const FS_COLLECTION = 'lamp_registry';

let DB, DB_MODE='local';

/* backend: localStorage */
const LocalDB={
  _k:k=>'lampreg:'+k,
  async list(prefix){
    const keys=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('lampreg:'+prefix))keys.push(k.slice('lampreg:'.length));
    }
    return {keys};
  },
  async get(k){
    const v=localStorage.getItem(LocalDB._k(k));
    if(v===null)throw new Error('not found');
    return {key:k,value:v};
  },
  async set(k,v){
    try{localStorage.setItem(LocalDB._k(k),v);}
    catch(e){throw new Error('พื้นที่เก็บข้อมูลในเครื่องเต็ม · ลองลดจำนวนรูปภาพ');}
    return {key:k,value:v};
  },
  async delete(k){localStorage.removeItem(LocalDB._k(k));return {key:k,deleted:true};}
};

/* backend: Claude preview */
const ClaudeDB={
  async list(prefix){return await window.storage.list(prefix,true);},

/* backend: Firebase Firestore */
function makeFirebaseDB(db,fs){
  const col=k=>fs.doc(db,FS_COLLECTION,k);
  return {
    _fs:fs,_db:db,
    async list(prefix){
      const snap=await fs.getDocs(fs.collection(db,FS_COLLECTION));
      const keys=[];snap.forEach(d=>{if(d.id.startsWith(prefix))keys.push(d.id);});
      return {keys};
    },
    async get(k){
      const d=await fs.getDoc(col(k));
      if(!d.exists())throw new Error('not found');
      return {key:k,value:d.data().value};
    },
    async set(k,v){await fs.setDoc(col(k),{value:v,updatedAt:Date.now()});return {key:k,value:v};},
    async delete(k){await fs.deleteDoc(col(k));return {key:k,deleted:true};},
    // ฟังการเปลี่ยนแปลงแบบเรียลไทม์ (ทุกเครื่องเห็นพร้อมกัน)
    listen(cb){
      try{return fs.onSnapshot(fs.collection(db,FS_COLLECTION),snap=>cb(snap),err=>console.error('listen err',err));}
      catch(e){console.error('onSnapshot unavailable',e);return null;}
    }
  };
}

let FB_ERROR='';
async function connectFirebase(cfg){
  const appMod=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const fs=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');  const app=appMod.initializeApp(cfg);
  const db=fs.getFirestore(app);
  const inst=makeFirebaseDB(db,fs);
  await inst.list('__ping');   // ทดสอบว่าอ่านได้จริง
  return inst;
}
/* ============ Firebase Storage (เก็บรูปเป็นไฟล์จริง) ============ */
let FBSTORAGE=null;   // {ref,uploadBytes,getDownloadURL,deleteObject,storage}
function isDataUrl(u){return typeof u==='string'&&u.startsWith('data:');}
function dataUrlToBlob(dataUrl){
  const [head,b64]=dataUrl.split(',');
  const mime=(head.match(/:(.*?);/)||[,'image/jpeg'])[1];
  const bin=atob(b64);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
async function connectStorage(cfg){
  const appMod=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const st=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js');
  const app=appMod.getApps().length?appMod.getApp():appMod.initializeApp(cfg);
  const storage=st.getStorage(app);
  return {storage,ref:st.ref,uploadBytes:st.uploadBytes,getDownloadURL:st.getDownloadURL,deleteObject:st.deleteObject};
}
/* อัปโหลด data URL 1 รูป -> คืนลิงก์ */
async function uploadPhoto(dataUrl,path){
  if(!FBSTORAGE)throw new Error('ยังไม่ได้เชื่อม Firebase Storage');
  const blob=dataUrlToBlob(dataUrl);
  const r=FBSTORAGE.ref(FBSTORAGE.storage,path);
  await FBSTORAGE.uploadBytes(r,blob,{contentType:blob.type});
  return await FBSTORAGE.getDownloadURL(r);
}
/* แปลงรูปในรายการให้เป็นลิงก์ทั้งหมด (ข้ามอันที่เป็นลิงก์อยู่แล้ว) */
async function materializePhotos(photos,folder,id,onProgress){
  const list=(photos||[]).filter(Boolean);
  if(!FBSTORAGE||!list.some(isDataUrl))return {photos:list,uploaded:0,failed:0};
  const out=[];let up=0,fail=0;
  for(let i=0;i<list.length;i++){
    const u=list[i];
    if(!isDataUrl(u)){out.push(u);continue;}
    try{
      if(onProgress)onProgress(i+1,list.length);
      const url=await uploadPhoto(u,`${folder}/${id}_${Date.now()}_${i}.jpg`);
      out.push(url);up++;
    }catch(e){
      console.error('upload failed',e);
      out.push(u);   // อัปโหลดไม่ได้ ให้เก็บ base64 ไว้ก่อน ไม่ทำข้อมูลหาย
      fail++;
    }
  }
  return {photos:out,uploaded:up,failed:fail};
}

/* ============ storage layer (per-record keys, shared) ============ */
const P_PREFIX='pt:', R_PREFIX='rp:', IV_PREFIX='iv:', TX_PREFIX='tx:';
let POINTS=[], REPAIRS=[], INV=[], TX=[];

function uid(pre){return pre+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return (s==null?'':s.toString()).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}

async function loadArr(prefix){
  try{
    const l=await DB.list(prefix,true);
    if(l&&l.keys&&l.keys.length){
      const rs=await Promise.all(l.keys.map(k=>DB.get(k,true).catch(()=>null)));
      return rs.filter(Boolean).map(r=>{try{return JSON.parse(r.value);}catch(e){return null;}}).filter(Boolean);
    }
  }catch(e){}
  return [];
}
async function loadAll(){
  [POINTS,REPAIRS,INV,TX]=await Promise.all([loadArr(P_PREFIX),loadArr(R_PREFIX),loadArr(IV_PREFIX),loadArr(TX_PREFIX)]);
}
/* ฟังการเปลี่ยนแปลงจาก Firestore แบบเรียลไทม์ · ทุกเครื่องเห็นพร้อมกัน */
let _liveOn=false, _liveTimer=null, _liveRender=false;
function startLiveSync(){
  if(_liveOn||DB_MODE!=='firebase'||!DB.listen)return;
  const unsub=DB.listen(snap=>{
    const P=[],R=[],I=[],T=[];
    snap.forEach(d=>{
      let v;try{v=JSON.parse(d.data().value);}catch(e){return;}
      if(!v)return;
      const id=d.id;
      if(id.startsWith(P_PREFIX))P.push(v);
      else if(id.startsWith(R_PREFIX))R.push(v);
      else if(id.startsWith(IV_PREFIX))I.push(v);
      else if(id.startsWith(TX_PREFIX))T.push(v);
    });
    POINTS=P;REPAIRS=R;INV=I;TX=T;
    // หน่วงเล็กน้อยกันการ re-render ถี่เกินตอนซิงก์หลายเอกสาร
    clearTimeout(_liveTimer);
    _liveTimer=setTimeout(()=>{
      const h=location.hash||'';
      const editing=h==='#/new'||h.startsWith('#/edit/')||document.querySelector('.sheet-open')||document.querySelector('[style*="z-index:2000"]');
      if(editing)return;   // อย่ารีเฟรชทับหน้าฟอร์ม/ป๊อปอัปที่กำลังใช้
      _liveRender=true;render();_liveRender=false;
    },500);
  });
  if(unsub)_liveOn=true;
}
async function savePoint(p){
  const key=P_PREFIX+p.id;
  const res=await DB.set(key,JSON.stringify(p),true);
  if(!res)throw new Error('ระบบเก็บข้อมูลไม่ตอบกลับ (storage returned null)');
  // ตรวจสอบว่าบันทึกจริง (read-after-write)
  let saved=null;
  try{const back=await DB.get(key,true);saved=back&&back.value?JSON.parse(back.value):null;}catch(e){}
  if(!saved)throw new Error('บันทึกแล้วแต่อ่านกลับไม่ได้ · ข้อมูลอาจไม่ถูกเก็บ');
  const want=(p.poles||[]).length, got=(saved.poles||[]).length;
  if(want!==got)throw new Error('จำนวนเสาไม่ตรง (ต้องการ '+want+' ได้ '+got+')');
  const i=POINTS.findIndex(x=>x.id===p.id);if(i>=0)POINTS[i]=saved;else POINTS.push(saved);
  return saved;
}
async function delPoint(id){await DB.delete(P_PREFIX+id,true);POINTS=POINTS.filter(x=>x.id!==id);
  const rem=REPAIRS.filter(r=>r.pointId===id);for(const r of rem){await DB.delete(R_PREFIX+r.id,true);}REPAIRS=REPAIRS.filter(r=>r.pointId!==id);}
async function saveRepair(r){
  const key=R_PREFIX+r.id;
  const res=await DB.set(key,JSON.stringify(r),true);
  if(!res)throw new Error('ระบบเก็บข้อมูลไม่ตอบกลับ');
  let saved=null;
  try{const b=await DB.get(key,true);saved=b&&b.value?JSON.parse(b.value):null;}catch(e){}
  if(!saved)throw new Error('บันทึกแล้วแต่อ่านกลับไม่ได้');
  const i=REPAIRS.findIndex(x=>x.id===r.id);if(i>=0)REPAIRS[i]=saved;else REPAIRS.push(saved);
  return saved;
}
async function delRepair(id){await DB.delete(R_PREFIX+id,true);REPAIRS=REPAIRS.filter(x=>x.id!==id);}
async function saveItem(it){await DB.set(IV_PREFIX+it.id,JSON.stringify(it),true);const i=INV.findIndex(x=>x.id===it.id);if(i>=0)INV[i]=it;else INV.push(it);}
async function delItem(id){await DB.delete(IV_PREFIX+id,true);INV=INV.filter(x=>x.id!==id);
  const rem=TX.filter(t=>t.itemId===id);for(const t of rem){await DB.delete(TX_PREFIX+t.id,true);}TX=TX.filter(t=>t.itemId!==id);}
async function saveTx(t){await DB.set(TX_PREFIX+t.id,JSON.stringify(t),true);const i=TX.findIndex(x=>x.id===t.id);if(i>=0)TX[i]=t;else TX.push(t);}
async function delTx(id){await DB.delete(TX_PREFIX+id,true);TX=TX.filter(x=>x.id!==id);}

/* inventory computed */
function itemStats(itemId){
  const txs=TX.filter(t=>t.itemId===itemId);
  let tin=0,tout=0;
  txs.forEach(t=>{if(t.kind==='in')tin+=(+t.qty||0);else tout+=(+t.qty||0);});
  return {in:tin,out:tout,remaining:tin-tout};
}
function itemById(id){return INV.find(x=>x.id===id);}

/* ============ backup / restore / export ============ */
function downloadBlob(content,filename,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
}
function exportBackup(){

  const d=new Date();const stamp=d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  downloadBlob(JSON.stringify(data,null,2),'backup-ไฟถนน-'+stamp+'.json','application/json');

}
async function clearAllStorage(){
  for(const arr of [[P_PREFIX,POINTS],[R_PREFIX,REPAIRS],[IV_PREFIX,INV],[TX_PREFIX,TX]]){
    const [pre,list]=arr;for(const r of list){try{await DB.delete(pre+r.id,true);}catch(e){}}
  }
}
/* ขนาดสูงสุดต่อ 1 เอกสารของ Firestore = 1 MB (เผื่อไว้ที่ 900KB) */
const DOC_LIMIT=900*1024;
function docSize(obj){try{return new Blob([JSON.stringify(obj)]).size;}catch(e){return JSON.stringify(obj).length;}}
/* ลดรูปทีละใบจนขนาดพอดี */
function shrinkToFit(rec){
  const r={...rec};
  const notes=[];
  while(docSize(r)>DOC_LIMIT&&(r.photos||[]).length){
    r.photos=r.photos.slice(0,-1);
    notes.push('ตัดรูป');
  }
  return {rec:r,trimmed:notes.length};
}
/* บันทึกแบบทนทาน: ลองปกติ -> ลดรูป -> ตัดรูปทิ้ง */
async function saveResilient(kind,rec){
  const saver={point:savePoint,repair:saveRepair,item:saveItem,tx:saveTx}[kind];
  try{await saver(rec);return {ok:true,trimmed:0};}
  catch(e1){
    if((rec.photos||[]).length){
      const {rec:small,trimmed}=shrinkToFit(rec);
      try{await saver(small);return {ok:true,trimmed:trimmed||1,reason:e1.message};}
      catch(e2){
        try{await saver({...rec,photos:[]});return {ok:true,trimmed:(rec.photos||[]).length,reason:e2.message};}
        catch(e3){return {ok:false,error:e3.message||String(e3)};}
      }
    }
    return {ok:false,error:e1.message||String(e1)};
  }
}

function importBackup(file){
  const rd=new FileReader();
  rd.onload=async()=>{
    let data;try{data=JSON.parse(rd.result);}catch(e){alert('ไฟล์เสียหาย อ่านไม่ได้');return;}
    if(!data||!Array.isArray(data.points)){alert('ไฟล์สำรองไม่ถูกต้อง (ไม่พบข้อมูลจุด)');return;}

    const nP=(data.points||[]).length, nR=(data.repairs||[]).length,
          nI=(data.inventory||[]).length, nT=(data.transactions||[]).length;
    const nPoles=(data.points||[]).reduce((s,p)=>s+((p.poles||[]).length),0);
    if(!confirm('กู้คืนข้อมูลจากไฟล์นี้?\n\n'+
      'จุด/ซอย: '+nP+' (เสาไฟรวม '+nPoles+' ต้น)\n'+
      'แจ้งซ่อม: '+nR+'\nวัสดุ: '+nI+'\nประวัติวัสดุ: '+nT+'\n\n'+
      'ข้อมูลปัจจุบันทั้งหมดจะถูกแทนที่'))return;

    const total=nP+nR+nI+nT;
    let done=0, okC=0, trimC=0;
    const failures=[];
    const prog=m=>toast(m);

    await clearAllStorage();
    POINTS=[];REPAIRS=[];INV=[];TX=[];

    const run=async(kind,list,nameOf)=>{
      for(const rec of (list||[])){
        done++;
        if(done%5===0||done===total)prog('กำลังกู้คืน '+done+'/'+total+'...');
        const res=await saveResilient(kind,rec);   // <-- ไม่หยุดกลางคัน
        if(res.ok){okC++;if(res.trimmed)trimC++;}
        else failures.push(nameOf(rec)+' — '+res.error);
      }
    };

    await run('point',data.points,r=>'ซอย "'+(r.pointName||r.id)+'"');
    await run('repair',data.repairs,r=>'แจ้งซ่อม '+(r.id||''));
    await run('item',data.inventory,r=>'วัสดุ "'+(r.name||r.id)+'"');
    await run('tx',data.transactions,r=>'ประวัติวัสดุ '+(r.id||''));

    await loadAll();
    const gotPoles=POINTS.reduce((s,p)=>s+((p.poles||[]).length),0);

    let msg='กู้คืนเสร็จสิ้น\n\n';
    msg+='สำเร็จ '+okC+' / '+total+' รายการ\n';
    msg+='จุด/ซอย: '+POINTS.length+'/'+nP+'  ·  เสาไฟ: '+gotPoles+'/'+nPoles+'\n';
    msg+='แจ้งซ่อม: '+REPAIRS.length+'/'+nR+'  ·  วัสดุ: '+INV.length+'/'+nI+'\n';
    if(trimC)msg+='\n⚠️ '+trimC+' รายการถูกตัดรูปภาพออก เพราะไฟล์ใหญ่เกินขีดจำกัด\n(ข้อมูลอื่นครบถ้วน)\n';
    if(failures.length){
      msg+='\n❌ ล้มเหลว '+failures.length+' รายการ:\n'+failures.slice(0,8).join('\n');
      if(failures.length>8)msg+='\n...และอีก '+(failures.length-8)+' รายการ';
      msg+='\n\nไฟล์สำรองของท่านยังอยู่ครบ ลองกู้คืนใหม่อีกครั้งได้';
      console.error('Restore failures:',failures);
    }else{
      msg+='\n✅ ข้อมูลครบถ้วนทุกรายการ';
    }
    alert(msg);
    render();
  };
  rd.onerror=()=>alert('อ่านไฟล์ไม่สำเร็จ');
  rd.readAsText(file);
}

function exportExcel(){
  if(typeof XLSX==='undefined'){toast('กำลังโหลดตัวช่วย ลองใหม่อีกครั้ง');return;}
  const wb=XLSX.utils.book_new();
  // points sheet (one row per pole if any, else per point)
  const pRows=[];
  POINTS.forEach(p=>{
    const base={'หมู่ที่':p.moo||'', 'ชื่อหมู่บ้าน/ถนน':p.area||'', 'ชื่อจุด/ซอย':p.pointName||'','ประเภท':(p.lampType==='other'&&p.lampTypeOther)?p.lampTypeOther:typeMeta(p.lampType).label,'วัตต์':p.watt||'','จำนวนโคม':lampCount(p),'หมายเลขมิเตอร์':p.meterNo||'','หมายเลขหม้อแปลง':p.transformerNo||'','หมายเหตุ':p.note||''};
    const poles=(p.poles||[]);
    if(poles.length)poles.forEach((pole,i)=>pRows.push({...base,'เสาต้นที่':pole.label||('เสาต้นที่ '+(i+1)),'lat':pole.lat||'','lng':pole.lng||''}));
    else pRows.push({...base,'เสาต้นที่':'','lat':p.lat||'','lng':p.lng||''});
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(pRows.length?pRows:[{'ไม่มีข้อมูล':''}]),'จุดติดตั้ง');
  // ---- ชีต: โคมไฟแยกหมู่ (ไม่มีพิกัด) ----
  const dash=v=>{const t=(v==null?'':String(v)).trim();return t?t:'-';};
  const mooRows=POINTS.slice()
    .sort((a,b)=>{
      const na=parseInt(String(a.moo||'').replace(/\D/g,''))||999;
      const nb=parseInt(String(b.moo||'').replace(/\D/g,''))||999;
      return na-nb || (a.pointName||'').localeCompare(b.pointName||'','th');
    })
    .map(p=>{
      const bd=poleBreakdown(p);
      const lamps=Object.keys(bd).length
        ? Object.keys(bd).map(k=>k+' × '+bd[k]).join(', ')
        : (lampCount(p)?lampLabel(p)+' × '+lampCount(p):'');
      return {
        'หมู่ที่':dash(p.moo||p.group),
        'ซอย':dash(p.pointName),
        'จำนวนเสาทั้งหมด':(p.poles||[]).length||dash(''),
        'หลอดที่ใช้':dash(lamps),
        'เลขมิเตอร์':dash(p.meterNo),
        'เลขหม้อแปลง':dash(p.transformerNo)
      };
    });
  const mooSheet=XLSX.utils.json_to_sheet(mooRows.length?mooRows:[{'ไม่มีข้อมูล':''}]);
  mooSheet['!cols']=[{wch:12},{wch:26},{wch:16},{wch:38},{wch:16},{wch:20}];
  XLSX.utils.book_append_sheet(wb,mooSheet,'โคมไฟแยกหมู่');
  // repairs sheet
  const rRows=REPAIRS.map(r=>{const p=POINTS.find(x=>x.id===r.pointId);return{
    'วันที่แจ้ง':fmtDate(r.createdAt),'หมู่ที่':p?(p.moo||p.group):'','จุด/ซอย':p?p.pointName:'',
    'ผู้แจ้ง':r.reporterName||r.reporter||'','เบอร์โทร':r.reporterPhone||'',
    'หลอดที่ดับ':r.wholeSoi?'ทั้งซอย':(r.lampsOther||r.lampsOut||''),'จุดสังเกต':r.area||'',
    'สถานะ':statusMeta(r.status).label,'ที่มา':r.source==='public'?'ประชาชนแจ้ง':'เจ้าหน้าที่','รายละเอียด':r.desc||'','ใช้เวลา(วัน)':repairDays(r)??''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rRows.length?rRows:[{'ไม่มีข้อมูล':''}]),'แจ้งซ่อม');
  // inventory sheet
  const iRows=INV.map(it=>{const s=itemStats(it.id);return{
    'วัสดุ':it.name,'หน่วย':it.unit||'ดวง','รับเข้า':s.in,'เบิกใช้':s.out,'คงเหลือ':s.remaining,
    'ขั้นต่ำ':+it.needed||0,'ขาด':Math.max(0,(+it.needed||0)-s.remaining)};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(iRows.length?iRows:[{'ไม่มีข้อมูล':''}]),'คลังวัสดุ');
  const d=new Date();const stamp=d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');

}
/* ============ ส่งออกสำหรับ AutoCAD (DXF / CSV UTM) ============ */
/* แปลง WGS84 -> UTM (ประเทศไทยอยู่โซน 47N/48N) */
function toUTM(lat,lng){
  const a=6378137.0, f=1/298.257223563;
  const e2=f*(2-f), ep2=e2/(1-e2), k0=0.9996;
  const zone=Math.floor((lng+180)/6)+1;
  const lonOrigin=(zone-1)*6-180+3;
  const rad=Math.PI/180;
  const latR=lat*rad, lonR=lng*rad, lonOR=lonOrigin*rad;
  const N=a/Math.sqrt(1-e2*Math.pow(Math.sin(latR),2));
  const T=Math.pow(Math.tan(latR),2);
  const C=ep2*Math.pow(Math.cos(latR),2);
  const A=Math.cos(latR)*(lonR-lonOR);
  const M=a*((1-e2/4-3*e2*e2/64-5*Math.pow(e2,3)/256)*latR
        -(3*e2/8+3*e2*e2/32+45*Math.pow(e2,3)/1024)*Math.sin(2*latR)
        +(15*e2*e2/256+45*Math.pow(e2,3)/1024)*Math.sin(4*latR)
        -(35*Math.pow(e2,3)/3072)*Math.sin(6*latR));
  const easting=k0*N*(A+(1-T+C)*Math.pow(A,3)/6+(5-18*T+T*T+72*C-58*ep2)*Math.pow(A,5)/120)+500000.0;
  let northing=k0*(M+N*Math.tan(latR)*(A*A/2+(5-T+9*C+4*C*C)*Math.pow(A,4)/24
        +(61-58*T+T*T+600*C-330*ep2)*Math.pow(A,6)/720));
  if(lat<0)northing+=10000000.0;
  return {zone,easting,northing};
}
const ACI={sodium:2,metal:4,led:6,other:7}; // สีตามรหัส AutoCAD
function mooCode(p){
  const n=parseInt(String(p.moo||'').replace(/\D/g,''));
  return isNaN(n)?'X':String(n);
}
function typeCode(t){return ({sodium:'NA',metal:'MH',led:'LED'})[t]||'OTH';}
/* แปลงข้อความไทยเป็นค่าที่ CAD อ่านได้ปลอดภัย (ถ้าตั้ง codepage ไม่ได้) */
function cadText(t){return String(t==null?'':t);}

function buildDXF(opts){
  opts=opts||{};
  const useBlocks=opts.blocks!==false;
  const layers=new Map();
  const ents=[];
  let minE=1e12,minN=1e12,maxE=-1e12,maxN=-1e12,zone=null,count=0;
  const addLayer=(n,c)=>{if(!layers.has(n))layers.set(n,{name:n,color:c});};
  const g=(code,val)=>ents.push(String(code),String(val));

  POINTS.forEach(p=>{
    const pts=(p.poles||[]).filter(x=>x.lat&&x.lng);
    if(!pts.length)return;
    const mc=mooCode(p);
    const lyPole='M'+mc+'_POLE', lyLine='M'+mc+'_LINE', lyTxt='M'+mc+'_TEXT', lyNode='M'+mc+'_NODE';
    addLayer(lyPole,2);addLayer(lyLine,1);addLayer(lyTxt,7);addLayer(lyNode,3);

    const uts=pts.map(pole=>{
      const u=toUTM(+pole.lat,+pole.lng);
      zone=zone||u.zone;
      minE=Math.min(minE,u.easting);maxE=Math.max(maxE,u.easting);
      minN=Math.min(minN,u.northing);maxN=Math.max(maxN,u.northing);
      return {u,pole};
    });

    uts.forEach(({u,pole},i)=>{
      const lt=pole.lampType||p.lampType;
      const col=ACI[lt]||7;
      const watt=(pole.watt||p.watt||'');
      const label=(p.pointName||'')+'-'+(i+1);

      // POINT = โหนดสำหรับ snap (osnap: node)
      g(0,'POINT');g(8,lyNode);g(62,col);
      g(10,u.easting.toFixed(3));g(20,u.northing.toFixed(3));g(30,'0.0');

      if(useBlocks){
        // INSERT block พร้อม ATTRIB -> ดึงตาราง (Data Extraction) ได้
        g(0,'INSERT');g(66,'1');g(8,lyPole);g(62,col);g(2,'POLE');
        g(10,u.easting.toFixed(3));g(20,u.northing.toFixed(3));g(30,'0.0');
        const attr=(tag,val,dy)=>{
          g(0,'ATTRIB');g(8,lyTxt);
          g(10,(u.easting+2).toFixed(3));g(20,(u.northing+dy).toFixed(3));g(30,'0.0');
          g(40,'1.5');g(1,cadText(val));g(7,'STANDARD');g(2,tag);g(70,'0');
        };
        attr('ID',label,1.5);
        attr('TYPE',typeCode(lt),0);
        attr('WATT',watt,-1.5);
        attr('MOO',p.moo||'',-3.0);
        attr('SOI',p.pointName||'',-4.5);
        attr('METER',p.meterNo||'-',-6.0);
        attr('TRAFO',p.transformerNo||'-',-7.5);
        g(0,'SEQEND');g(8,lyPole);
      }else{
        g(0,'CIRCLE');g(8,lyPole);g(62,col);
        g(10,u.easting.toFixed(3));g(20,u.northing.toFixed(3));g(30,'0.0');g(40,'1.5');
        g(0,'TEXT');g(8,lyTxt);g(7,'STANDARD');
        g(10,(u.easting+2).toFixed(3));g(20,(u.northing+1).toFixed(3));g(30,'0.0');g(40,'2.0');
        g(1,cadText(label+' '+typeCode(lt)+watt+'W'));
      }
      count++;
    });

    for(let i=0;i<uts.length-1;i++){
      g(0,'LINE');g(8,lyLine);g(62,1);
      g(10,uts[i].u.easting.toFixed(3));g(20,uts[i].u.northing.toFixed(3));g(30,'0.0');
      g(11,uts[i+1].u.easting.toFixed(3));g(21,uts[i+1].u.northing.toFixed(3));g(31,'0.0');
    }
  });
  if(!count)return null;

  // ---- คำอธิบายแผนผัง (legend) มุมซ้ายล่าง ----
  addLayer('TITLE',7);
  const tx=minE, ty=minN-12;
  const line=(txt,dy,h)=>{g(0,'TEXT');g(8,'TITLE');g(7,'STANDARD');
    g(10,tx.toFixed(3));g(20,(ty-dy).toFixed(3));g(30,'0.0');g(40,String(h||2));g(1,cadText(txt));};
  line('STREET LIGHT PLAN - Huai Yai Subdistrict',0,3);
  line('CRS: WGS84 / UTM Zone '+zone+'N (EPSG:326'+zone+')  UNITS: METERS',5,2);
  line('POLES: '+count+'   EXPORTED: '+new Date().toISOString().slice(0,10),9,2);
  line('LEGEND: NA=Sodium(2)  MH=MetalHalide(4)  LED=6  OTH=7',13,2);
  minN=Math.min(minN,ty-16);

  // ---- HEADER ----
  const header=['0','SECTION','2','HEADER',
    '9','$ACADVER','1','AC1009',
    '9','$DWGCODEPAGE','3','ANSI_874',
    '9','$INSBASE','10','0.0','20','0.0','30','0.0',
    '9','$EXTMIN','10',minE.toFixed(3),'20',minN.toFixed(3),'30','0.0',
    '9','$EXTMAX','10',maxE.toFixed(3),'20',maxN.toFixed(3),'30','0.0',
    '9','$LIMMIN','10',minE.toFixed(3),'20',minN.toFixed(3),
    '9','$LIMMAX','10',maxE.toFixed(3),'20',maxN.toFixed(3),
    '9','$LUNITS','70','2','9','$INSUNITS','70','6',   // 6 = เมตร
    '9','$PDMODE','70','34','9','$PDSIZE','40','0.5',
    '0','ENDSEC'];

  // ---- TABLES: LTYPE + LAYER + STYLE ----
  const ls=[...layers.values()];
  const tables=['0','SECTION','2','TABLES'];
  // LTYPE (ต้องประกาศ ไม่งั้นบาง CAD ฟ้อง)
  tables.push('0','TABLE','2','LTYPE','70','1',
    '0','LTYPE','2','CONTINUOUS','70','0','3','Solid line','72','65','73','0','40','0.0',
    '0','ENDTAB');
  // LAYER
  tables.push('0','TABLE','2','LAYER','70',String(ls.length));
  ls.forEach(l=>tables.push('0','LAYER','2',l.name,'70','0','62',String(l.color),'6','CONTINUOUS'));
  tables.push('0','ENDTAB');
  // STYLE (สำหรับ TEXT/ATTRIB)
  tables.push('0','TABLE','2','STYLE','70','1',
    '0','STYLE','2','STANDARD','70','0','40','0.0','41','1.0','50','0.0','71','0','42','2.5',
    '3','txt','4','',
    '0','ENDTAB');
  tables.push('0','ENDSEC');

  // ---- BLOCKS: นิยาม block POLE + ATTDEF ----
  const blocks=['0','SECTION','2','BLOCKS'];
  if(useBlocks){
    blocks.push('0','BLOCK','8','0','2','POLE','70','2','10','0.0','20','0.0','30','0.0','3','POLE','1','');
    // สัญลักษณ์เสา: วงกลม + กากบาท
    blocks.push('0','CIRCLE','8','0','10','0.0','20','0.0','30','0.0','40','1.5');
    blocks.push('0','LINE','8','0','10','-1.5','20','0.0','30','0.0','11','1.5','21','0.0','31','0.0');
    blocks.push('0','LINE','8','0','10','0.0','20','-1.5','30','0.0','11','0.0','21','1.5','31','0.0');
    const attdef=(tag,prompt,dy)=>blocks.push('0','ATTDEF','8','0',
      '10','2.0','20',String(dy),'30','0.0','40','1.5','1','','3',prompt,'2',tag,'70','0','7','STANDARD');
    attdef('ID','Pole ID',1.5);
    attdef('TYPE','Lamp type',0);
    attdef('WATT','Watt',-1.5);
    attdef('MOO','Moo',-3.0);
    attdef('SOI','Soi',-4.5);
    attdef('METER','Meter no',-6.0);
    attdef('TRAFO','Transformer no',-7.5);
    blocks.push('0','ENDBLK','8','0');
  }
  blocks.push('0','ENDSEC');

  const body=[...header,...tables,...blocks,'0','SECTION','2','ENTITIES',...ents,'0','ENDSEC','0','EOF'];
  return {text:body.join('\r\n'),count,zone};
}

/* ---- KML สำหรับ Google Earth / QGIS ---- */
function buildKML(){
  const esc2=t=>String(t==null?'':t).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  let n=0;
  const styles=`
  <Style id="sodium"><IconStyle><color>ff3da3e8</color><scale>0.9</scale></IconStyle></Style>
  <Style id="metal"><IconStyle><color>ffb5a73f</color><scale>0.9</scale></IconStyle></Style>
  <Style id="led"><IconStyle><color>ffd86b7c</color><scale>0.9</scale></IconStyle></Style>
  <Style id="other"><IconStyle><color>ff72645b</color><scale>0.9</scale></IconStyle></Style>
  <Style id="soiline"><LineStyle><color>ff241be0</color><width>3</width></LineStyle></Style>`;
  const folders=POINTS.map(p=>{
    const pts=(p.poles||[]).filter(x=>x.lat&&x.lng);
    if(!pts.length)return '';
    n+=pts.length;
    const marks=pts.map((pole,i)=>{
      const lt=pole.lampType||p.lampType;
      return `<Placemark><name>${esc2((p.pointName||'')+'-'+(i+1))}</name>
        <styleUrl>#${lt}</styleUrl>
        <description><![CDATA[หมู่: ${esc2(p.moo||'-')}<br>ซอย: ${esc2(p.pointName||'-')}<br>หลอด: ${esc2(poleLampLabel(p,pole))}<br>มิเตอร์: ${esc2(p.meterNo||'-')}<br>หม้อแปลง: ${esc2(p.transformerNo||'-')}]]></description>
        <Point><coordinates>${pole.lng},${pole.lat},0</coordinates></Point></Placemark>`;
    }).join('');
    const path=pts.length>1?`<Placemark><name>แนวเสา ${esc2(p.pointName||'')}</name><styleUrl>#soiline</styleUrl>
      <LineString><tessellate>1</tessellate><coordinates>${pts.map(x=>x.lng+','+x.lat+',0').join(' ')}</coordinates></LineString></Placemark>`:'';
    return `<Folder><name>${esc2((p.moo?p.moo+' · ':'')+(p.pointName||''))}</name>${marks}${path}</Folder>`;
  }).join('');
  if(!n)return null;
  return {text:`<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2"><Document>
<name>ทะเบียนโคมไฟถนน</name>${styles}${folders}
</Document></kml>`,count:n};
}
function exportKML(){
  const r=buildKML();
  if(!r){alert('ยังไม่มีเสาไฟที่บันทึกพิกัด');return;}
  const d=new Date();const stamp=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  downloadBlob(r.text,'lamp-plan-'+stamp+'.kml','application/vnd.google-earth.kml+xml');
  alert('ส่งออก KML สำเร็จ ('+r.count+' เสา)\n\nเปิดได้ใน Google Earth, QGIS\nหรือนำเข้า AutoCAD Map/Civil 3D ด้วย MAPIMPORT');
}

      ? 'เสาเป็น BLOCK "POLE" มี ATTRIBUTE 7 ช่อง\n(ID, TYPE, WATT, MOO, SOI, METER, TRAFO)\nใช้คำสั่ง DATAEXTRACTION สร้างตารางได้เลย\n\n'

}

/* ============ สำรองข้อมูลอัตโนมัติ ============ */
const BK_PREFIX='bk:';
const AUTO_BK_KEEP=7;                    // เก็บย้อนหลังกี่ชุด
const AUTO_BK_INTERVAL=12*60*60*1000;    // ทุก 12 ชั่วโมง

function backupPayload(){
  return {app:'lamp-registry',version:1,exportedAt:new Date().toISOString(),
    points:POINTS,repairs:REPAIRS,inventory:INV,transactions:TX};
}
/* ลดขนาด: ตัดรูป base64 ออกจากชุดสำรองอัตโนมัติ (รูปบน Storage เก็บเป็นลิงก์อยู่แล้ว) */
function slimForAuto(data){
  const strip=arr=>(arr||[]).map(o=>{
    if(!o.photos||!o.photos.length)return o;
    const keep=o.photos.filter(u=>!isDataUrl(u));
    return {...o,photos:keep,_photosDropped:o.photos.length-keep.length||undefined};
  });
  return {...data,points:strip(data.points),repairs:strip(data.repairs)};
}
async function listBackups(){
  try{
    const l=await DB.list(BK_PREFIX,true);
    return (l&&l.keys?l.keys:[]).sort().reverse();
  }catch(e){return [];}
}
async function runAutoBackup(force){
  if(DB_MODE!=='firebase'&&!force)return {skipped:'ต้องเชื่อมคลาวด์ก่อน'};
  const now=Date.now();
  const lastRaw=localStorage.getItem('lampreg:lastAutoBk');
  const last=lastRaw?+lastRaw:0;
  if(!force&&now-last<AUTO_BK_INTERVAL)return {skipped:'ยังไม่ถึงรอบ'};
  if(!POINTS.length&&!REPAIRS.length)return {skipped:'ไม่มีข้อมูล'};

  const stamp=new Date().toISOString().replace(/[:.]/g,'-');
  const key=BK_PREFIX+stamp;
  let payload=slimForAuto(backupPayload());
  let json=JSON.stringify(payload);
  // ถ้าใหญ่เกิน 1 เอกสาร ให้ตัดสิ่งที่ไม่จำเป็นออก
  if(docSize(payload)>DOC_LIMIT){
    payload={...payload,points:payload.points.map(p=>({...p,photos:[]}))};
    json=JSON.stringify(payload);
  }
  if(json.length>DOC_LIMIT)return {error:'ข้อมูลใหญ่เกินกว่าจะสำรองอัตโนมัติ · กรุณาสำรองเป็นไฟล์'};

  try{
    await DB.set(key,json,true);
    localStorage.setItem('lampreg:lastAutoBk',String(now));
    // ลบชุดเก่าเกินโควตา
    const all=await listBackups();
    for(const k of all.slice(AUTO_BK_KEEP)){try{await DB.delete(k,true);}catch(e){}}
    return {ok:true,key,kept:Math.min(all.length,AUTO_BK_KEEP),size:json.length};
  }catch(e){return {error:e.message||String(e)};}
}
async function restoreFromAuto(key){
  if(!confirm('กู้คืนจากชุดสำรอง\n'+key.replace(BK_PREFIX,'')+'\n\nข้อมูลปัจจุบันทั้งหมดจะถูกแทนที่'))return;
  let data;
  try{const r=await DB.get(key,true);data=JSON.parse(r.value);}
  catch(e){alert('อ่านชุดสำรองไม่สำเร็จ: '+(e.message||e));return;}
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  importBackup(new File([blob],'auto-backup.json',{type:'application/json'}));
}
function fmtBkKey(k){
  const iso=k.replace(BK_PREFIX,'').replace(/-(\d{2})-(\d{2})-(\d{3})Z$/,':$1:$2.$3Z');
  const d=new Date(iso);
  return isNaN(d)?k:fmtDate(d.toISOString());
}

/* repair duration in days (created -> done) */
function repairDays(r){
  if(r.status!=='done')return null;
  const done=r.doneAt||r.updatedAt;if(!done||!r.createdAt)return null;
  const ms=new Date(done)-new Date(r.createdAt);if(ms<0)return null;
  return Math.round(ms/86400000*10)/10;
}
function avgRepairDays(list){
  const ds=list.map(repairDays).filter(x=>x!=null);
  if(!ds.length)return null;return Math.round(ds.reduce((a,b)=>a+b,0)/ds.length*10)/10;
}

/* ============ meta ============ */
function typeMeta(t){
  if(t==='sodium')return{label:'โซเดียม',cls:'sodium'};
  if(t==='metal')return{label:'เมทัลฮาไลค์',cls:'metal'};
  if(t==='led')return{label:'LED',cls:'led'};
  return{label:'อื่นๆ',cls:'other'};
}
function typeColor(t){return t==='sodium'?'#E8A33D':t==='metal'?'#3FA7B5':t==='led'?'#7C6BD8':'#5B6472';}
const STATUSES=[
  {k:'pending',label:'รอรับเรื่อง',cls:'st-pending',c:'#8E5BD8'},
  {k:'new',label:'รับเรื่อง',cls:'st-new',c:'#C94C4C'},
  {k:'check',label:'ตรวจสอบ',cls:'st-check',c:'#E0872B'},
  {k:'waiting',label:'รอวัสดุอุปกรณ์',cls:'st-waiting',c:'#B4763B'},
  {k:'progress',label:'อยู่ระหว่างดำเนินงาน',cls:'st-progress',c:'#3FA7B5'},
  {k:'done',label:'เสร็จสิ้น',cls:'st-done',c:'#3E9E6B'}
];
/* สถานะที่เจ้าหน้าที่กดเปลี่ยนได้ (ไม่รวม pending) */
const WORK_STATUSES=STATUSES.filter(x=>x.k!=='pending');
function statusMeta(k){return STATUSES.find(s=>s.k===k)||STATUSES[0];}
function lampLabel(p){const tm=typeMeta(p.lampType);const base=(p.lampType==='other'&&p.lampTypeOther)?p.lampTypeOther:tm.label;return base+(p.watt?' '+p.watt+'W':'');}
/* ป้ายกำกับหลอดของ "เสาต้นหนึ่ง" (ถ้าไม่ระบุ ใช้ค่าของซอย) */
function poleLampLabel(p,pole){
  const t=pole.lampType||p.lampType, w=pole.watt||p.watt;
  const tm=typeMeta(t);
  const base=(t==='other'&&(pole.lampTypeOther||p.lampTypeOther))?(pole.lampTypeOther||p.lampTypeOther):tm.label;
  return base+(w?' '+w+'W':'');
}
function poleColor(p,pole){return typeColor(pole.lampType||p.lampType);}
/* จำนวนโคม: อิงตามจำนวนเสาที่ปักไว้ ถ้ายังไม่มีเสาจึงใช้ค่าที่กรอกเอง */
function lampCount(p){const n=(p.poles||[]).length;return n>0?n:(+p.count||0);}
/* ระยะทางระหว่างพิกัด (เมตร) - Haversine */
function distMeters(lat1,lng1,lat2,lng2){
  const R=6371000,r=Math.PI/180;
  const dLa=(lat2-lat1)*r,dLo=(lng2-lng1)*r;
  const x=Math.sin(dLa/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
/* ช่วงระยะห่างระหว่างเสาที่มีพิกัด (เรียงตามลำดับที่บันทึก) */
function poleSpans(p){
  const g=(p.poles||[]).filter(x=>x.lat&&x.lng);
  const spans=[];let total=0;
  for(let i=0;i<g.length-1;i++){
    const d=distMeters(+g[i].lat,+g[i].lng,+g[i+1].lat,+g[i+1].lng);
    spans.push({from:i,to:i+1,d,a:g[i],b:g[i+1]});
    total+=d;
  }
  return {spans,total,count:g.length};
}
function fmtDist(m){return m<1000?Math.round(m)+' ม.':(m/1000).toFixed(2)+' กม.';}
/* เปลี่ยนเลขเสาที่ใช้รูปแบบ "เสาต้นที่ N" ให้ตรงลำดับใหม่ · เสาที่ตั้งชื่อเองไม่แตะ */
function renumberPoles(p){
  (p.poles||[]).forEach((pole,i)=>{
    if(!pole.label || /^เสาต้นที่\s*\d+$/.test(pole.label.trim())){
      pole.label='เสาต้นที่ '+(i+1);
    }
  });
}
/* สรุปหลอดแยกขนาดในซอย */
function poleBreakdown(p){
  const m={};(p.poles||[]).forEach(pole=>{const k=poleLampLabel(p,pole);m[k]=(m[k]||0)+1;});
  return m;
}
/* เรื่องร้องเรียนที่ "มองเห็นได้" ตามโหมด — pending ซ่อนจากโหมดดูอย่างเดียว */
/* ===== ปกปิดข้อมูลส่วนบุคคลในโหมดดูอย่างเดียว ===== */
function maskName(full){
  const t=(full||'').trim();
  if(!t)return '-';
  const parts=t.split(/\s+/);
  const first=parts[0];
  // ชื่อ: เก็บ 3 ตัวแรก แล้วตามด้วย xxx (ถ้าสั้นกว่า 3 เก็บ 1 ตัว)
  const keep=first.length>3?3:1;
  let out=first.slice(0,keep)+'xxx';
  // นามสกุล: ตัวแรก + จุด
  if(parts.length>1&&parts[1])out+=' '+parts[1][0]+'.';
  return out;
}
function maskPhone(ph){
  const t=(ph||'').trim();
  if(!t)return '-';
  const digits=t.replace(/\D/g,'');
  if(digits.length<6)return 'XXX';
  const head=digits.slice(0,3);
  const tail=digits.slice(-3);
  const midLen=Math.max(1,digits.length-6);
  return head+'-'+'X'.repeat(midLen)+'-'+tail;
}
/* คืนค่าที่แสดงได้ตามโหมดปัจจุบัน */
function showName(r){return EDIT_MODE?(r.reporterName||r.reporter||'-'):maskName(r.reporterName||r.reporter);}
function showPhone(r){return EDIT_MODE?(r.reporterPhone||'-'):maskPhone(r.reporterPhone);}

function visibleRepairs(){return EDIT_MODE?REPAIRS:REPAIRS.filter(r=>r.status!=='pending');}
function openRepairsFor(id){return visibleRepairs().filter(r=>r.pointId===id&&r.status!=='done'&&r.status!=='pending');}
function pendingCount(){return REPAIRS.filter(r=>r.status==='pending').length;}
function pointUrl(id){return location.href.split('#')[0]+'#/point/'+id;}
function mapsLink(p){if(p.mapUrl)return p.mapUrl;if(p.lat&&p.lng)return 'https://www.google.co.th/maps/dir/?api=1&destination='+p.lat+','+p.lng;return null;}
function fmtDate(iso){if(!iso)return '';const d=new Date(iso);return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}

/* ============ image compression (วัดขนาดจริง แล้วบีบจนพอดี) ============ */
const PHOTO_BUDGET = 220*1024;   // ไบต์ต่อรูป (หลังเข้ารหัส) — 3 รูปยังห่างเพดาน 1MB
const MAX_PHOTOS = 3;

function b64Bytes(dataUrl){
  const i=dataUrl.indexOf(',');
  const b=dataUrl.length-i-1;
  const pad=(dataUrl.endsWith('==')?2:dataUrl.endsWith('=')?1:0);
  return Math.floor(b*3/4)-pad;
}
function drawToDataUrl(img,maxDim,quality){
  let{width:w,height:h}=img;
  if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
  else if(h>=w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);   // กันพื้นโปร่งใสกลายเป็นดำ
  ctx.drawImage(img,0,0,w,h);
  return cv.toDataURL('image/jpeg',quality);
}
function loadImage(src){
  return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src;});
}
/* บีบจนขนาด <= budget โดยลดขนาด/คุณภาพทีละขั้น */
async function compressToBudget(src,budget){
  const img=await loadImage(src);
  const steps=[[1400,.78],[1200,.72],[1000,.68],[900,.62],[800,.55],[700,.48],[600,.42],[520,.38],[440,.34]];
  let out=null;
  for(const [dim,q] of steps){
    out=drawToDataUrl(img,dim,q);
    if(b64Bytes(out)<=budget)return out;
  }
  return out;   // เล็กที่สุดเท่าที่ทำได้
}
async function compressImage(file){
  const dataUrl=await new Promise((res,rej)=>{
    const rd=new FileReader();rd.onload=()=>res(rd.result);rd.onerror=rej;rd.readAsDataURL(file);
  });
  return await compressToBudget(dataUrl,PHOTO_BUDGET);
}
/* ตรวจก่อนบันทึก: ถ้ารายการยังใหญ่เกิน ให้บีบซ้ำจนพอดี */
async function fitPhotosForSave(rec,onNote){
  if(!rec.photos||!rec.photos.length)return rec;
  let photos=[...rec.photos];
  const size=()=>docSize({...rec,photos});
  if(size()<=DOC_LIMIT)return {...rec,photos};
  // รอบ 1: บีบรูปที่เป็น base64 ให้เล็กลงเรื่อยๆ
  for(const budget of [180*1024,120*1024,80*1024,50*1024]){
    for(let i=0;i<photos.length;i++){
      if(!isDataUrl(photos[i]))continue;
      if(b64Bytes(photos[i])>budget){
        try{photos[i]=await compressToBudget(photos[i],budget);}catch(e){}
      }
    }
    if(onNote)onNote('กำลังลดขนาดรูป...');
    if(size()<=DOC_LIMIT)return {...rec,photos};
  }
  // รอบ 2: จำเป็นต้องตัดรูปท้ายออก
  while(photos.length&&size()>DOC_LIMIT)photos.pop();
  return {...rec,photos,_trimmed:true};
}

/* ============ ทำให้ dropdown ค้นหาได้ ============ */
function makeSearchable(sel,placeholder){
  if(!sel||sel.dataset.searchable)return;
  sel.dataset.searchable='1';
  const box=document.createElement('input');
  box.type='text';
  box.placeholder=placeholder||'🔍 พิมพ์เพื่อค้นหา...';
  box.style.cssText='width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line);font-family:Sarabun,sans-serif;font-size:14px;margin-bottom:6px;background:var(--surface);';
  sel.parentNode.insertBefore(box,sel);

  // เก็บตัวเลือกทั้งหมดไว้ตั้งแต่ต้น
  const groups=[...sel.querySelectorAll('optgroup')].map(g=>({
    label:g.label, opts:[...g.querySelectorAll('option')].map(o=>({v:o.value,t:o.textContent,sel:o.selected}))
  }));
  const loose=[...sel.children].filter(c=>c.tagName==='OPTION')
    .map(o=>({v:o.value,t:o.textContent,sel:o.selected}));

  function rebuild(q){
    const s=(q||'').trim().toLowerCase();
    const keep=o=>!s||o.t.toLowerCase().includes(s)||(o.v===''); // เก็บตัวเลือก "ไม่ระบุ" ไว้เสมอ
    const cur=sel.value;
    sel.innerHTML='';
    loose.filter(keep).forEach(o=>{
      const e=document.createElement('option');e.value=o.v;e.textContent=o.t;sel.appendChild(e);
    });
    groups.forEach(g=>{
      const hits=g.opts.filter(keep);
      if(!hits.length)return;
      const og=document.createElement('optgroup');og.label=g.label;
      hits.forEach(o=>{const e=document.createElement('option');e.value=o.v;e.textContent=o.t;og.appendChild(e);});
      sel.appendChild(og);
    });
    // คงค่าเดิมถ้ายังอยู่ในรายการ
    if([...sel.querySelectorAll('option')].some(o=>o.value===cur))sel.value=cur;
    const n=sel.querySelectorAll('option').length;
    box.style.borderColor=(s&&!n)?'var(--danger)':'var(--line)';
  }
  box.oninput=()=>rebuild(box.value);
  box.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();sel.focus();}};
}
/* เรียกใช้กับหลาย select พร้อมกัน */
function makeSearchableAll(root,ids,placeholder){
  ids.forEach(id=>{const el=(root||document).querySelector('#'+id);if(el)makeSearchable(el,placeholder);});
}

        <div style="text-align:center;border-bottom:2px solid #1B2430;padding-bottom:10px;margin-bottom:14px">
          <div style="font-weight:800;font-size:17px">แผนผังตำแหน่งเสาไฟฟ้าสาธารณะ</div>
          <div style="font-size:12.5px;color:#555;margin-top:2px">เทศบาลตำบลห้วยใหญ่ · พิมพ์ ${today} · ${sel.length} ซอย · ${totalPoles} เสา</div>
        </div>
        ${mode!=='list'?`<div id="printMap" style="width:100%;height:440px;border:1px solid #999;border-radius:8px;margin-bottom:16px"></div>`:''}
        ${mode!=='map'?listHtml:''}
      </div>
    </div>`;

  if(mode!=='list'){
    setTimeout(()=>{
      const el=document.getElementById('printMap');if(!el)return;
      const pm=L.map(el,{zoomControl:true,attributionControl:false});
      const tile=useSat
        ?L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19})
        :L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19});
      tile.addTo(pm);
      const all=[];
      sel.forEach(p=>{
        const col=typeColor(p.lampType);
        const poles=(p.poles||[]).filter(x=>x.lat&&x.lng);
        const line=[];
        poles.forEach((pole,i)=>{
          const c=poleColor(p,pole);
          const icon=L.divIcon({className:'',html:`<div style="width:18px;height:18px;border-radius:50%;background:${c};color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)">${i+1}</div>`,iconSize:[18,18],iconAnchor:[9,9]});
          L.marker([+pole.lat,+pole.lng],{icon}).addTo(pm).bindTooltip(esc(p.pointName)+' #'+(i+1),{permanent:false});
          line.push([+pole.lat,+pole.lng]);all.push([+pole.lat,+pole.lng]);
        });
        if(line.length>1){
          L.polyline(line,{color:'#E01B24',weight:3,opacity:.9}).addTo(pm);
          // ป้ายระยะรวมต้นแรก-สุดท้าย วางที่กึ่งกลางแนวเสา
          let tot=0;for(let i=0;i<line.length-1;i++)tot+=distMeters(line[i][0],line[i][1],line[i+1][0],line[i+1][1]);
          const mid=line[Math.floor(line.length/2)];
          L.marker(mid,{icon:L.divIcon({className:'',html:`<div style="background:#fff;border:1px solid #E01B24;color:#111;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;white-space:nowrap">รวม ${Math.round(tot)} ม.</div>`,iconSize:[1,1]})}).addTo(pm);
        }
        if(poles.length===0&&p.lat&&p.lng){
          L.circleMarker([+p.lat,+p.lng],{radius:7,color:col,fillColor:col,fillOpacity:.8}).addTo(pm).bindTooltip(esc(p.pointName));
          all.push([+p.lat,+p.lng]);
        }
      });
      if(all.length>1)pm.fitBounds(all,{padding:[30,30]});
      else if(all.length===1)pm.setView(all[0],17);
      else pm.setView([12.9236,100.8825],13);
      setTimeout(()=>pm.invalidateSize(),200);
    },80);
  }
}

/* ============ พิมพ์ (แก้ปัญหา iOS Safari กดแล้วไม่ขึ้น) ============ */
function doPrint(){
  // ปิดแป้นพิมพ์/โฟกัสที่อาจบล็อกการพิมพ์บน iOS
  if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();

  toast('กำลังเตรียมพิมพ์...');

/* ============ router ============ */
function updateCloudWarn(){
  let el=document.getElementById('cloudWarn');
  const needWarn=(DB_MODE!=='firebase');
  if(needWarn&&!el){
    el=document.createElement('div');el.id='cloudWarn';
    el.onclick=()=>{location.hash='#/storage';};
    document.body.insertBefore(el,document.getElementById('app'));
  }
  if(el){
    if(!needWarn){el.remove();return;}
    el.innerHTML='⚠️ ยังไม่ได้เชื่อมคลาวด์ · ข้อมูลอยู่เฉพาะเบราว์เซอร์นี้<br><u>แตะที่นี่เพื่อเชื่อมต่อ Firebase</u>';

function render(){
  const h=location.hash||'#/dashboard';
  if(h.startsWith('#/point/'))renderDetail(h.split('/')[2]);
  else if(h==='#/new')renderForm(null);
  else if(h.startsWith('#/edit/'))renderForm(h.split('/')[2]);

  else if(h==='#/report')renderReport();
  else if(h==='#/inventory')renderInventory();
  else if(h.startsWith('#/inv/'))renderInvDetail(h.split('/')[2]);
  else if(h==='#/complain')renderComplain(null);
  else if(h.startsWith('#/complain/'))renderComplain(h.split('/')[2]);

      (secure&&!framed&&supported?'<div style="color:var(--ok);margin-top:6px;font-weight:600">พร้อมใช้งาน GPS · เหลือแค่กดอนุญาตสิทธิ์</div>':'<div style="color:var(--danger);margin-top:6px;font-weight:600">GPS จะยังใช้ไม่ได้ · ใช้ "🗺️ ปักหมุดบนแผนที่" แทนได้</div>');
  }
  const rr=document.getElementById('recentRep');
  if(!recent.length){rr.innerHTML=`<div class="hint">ยังไม่มีการแจ้งซ่อม</div>`;}
  else{rr.innerHTML=recent.map(r=>repCardHtml(r,false)).join('');bindRepCards();}
}

    const na=parseInt(String(a).replace(/\D/g,''))||999, nb=parseInt(String(b).replace(/\D/g,''))||999;
    return na-nb||a.localeCompare(b,'th');
  });
  // ซอยที่เลือกได้ ขึ้นกับหมู่ที่เลือก
  const soisInMoo=[...new Set(POINTS.filter(p=>!LS.moo||mooOf(p)===LS.moo).map(p=>p.pointName).filter(Boolean))]
    .sort((a,b)=>a.localeCompare(b,'th'));
  if(LS.soi&&!soisInMoo.includes(LS.soi))LS.soi='';   // เปลี่ยนหมู่แล้วซอยเดิมไม่มี -> ล้างค่า

  let list=POINTS.filter(p=>{
    if(LS.moo&&mooOf(p)!==LS.moo)return false;
    if(LS.soi&&p.pointName!==LS.soi)return false;
    if(LS.type&&p.lampType!==LS.type)return false;
    if(LS.q){const hay=((p.moo||'')+' '+(p.group||'')+' '+p.pointName+' '+(p.note||'')).toLowerCase();if(!hay.includes(LS.q.toLowerCase()))return false;}
    return true;
  });
  const grouped={};list.forEach(p=>{(grouped[p.group||'ไม่ระบุกลุ่ม']=grouped[p.group||'ไม่ระบุกลุ่ม']||[]).push(p);});
  const gnames=Object.keys(grouped).sort();

  app.innerHTML=`

      <div class="eyebrow">ค้นหาจุดติดตั้ง</div>

    </div>
    <div class="content">
      <div class="toolbar"><input type="text" id="q" placeholder="🔍 ค้นหาชื่อซอย / จุด..." value="${esc(LS.q)}"></div>
            <div class="toolbar">
        <select id="fmoo" style="flex:1">
          <option value="">ทุกหมู่</option>
          ${moos.map(g=>`<option value="${esc(g)}" ${g===LS.moo?'selected':''}>${esc(g)}</option>`).join('')}
        </select>
      </div>
      <div class="toolbar">
        <select id="fsoi" style="flex:1" ${!LS.moo?'':''}>
          <option value="">${LS.moo?'ทุกซอยใน'+esc(LS.moo):'ทุกซอย'}</option>
          ${soisInMoo.map(n=>`<option value="${esc(n)}" ${n===LS.soi?'selected':''}>${esc(n)}</option>`).join('')}
        </select>
        <select id="ft"><option value="">ทุกประเภท</option><option value="sodium" ${LS.type==='sodium'?'selected':''}>โซเดียม</option><option value="metal" ${LS.type==='metal'?'selected':''}>เมทัลฮาไลค์</option><option value="led" ${LS.type==='led'?'selected':''}>LED</option><option value="other" ${LS.type==='other'?'selected':''}>อื่นๆ</option></select>

      <div id="lw"></div>

  const lw=document.getElementById('lw');
  if(!gnames.length){lw.innerHTML=`<div class="empty"><div class="big">🔦</div>${POINTS.length?'ไม่พบจุดที่ค้นหา':'ยังไม่มีข้อมูล กดปุ่ม + เพื่อเพิ่มจุดแรก'}</div>`;}

/* ============ GPS helper (robust) ============ */
function gpsBlockedReason(){
  const secure=window.isSecureContext||location.protocol==='https:'||location.hostname==='localhost';
  const framed=window.self!==window.top;
  if(!navigator.geolocation)return 'อุปกรณ์/เบราว์เซอร์นี้ไม่รองรับ GPS';
  if(!secure)return 'ต้องเปิดหน้านี้ผ่าน https:// (เปิดไฟล์ตรงๆ จะใช้ GPS ไม่ได้)';
  if(framed)return 'หน้านี้ถูกฝังใน iframe ที่ปิดสิทธิ์ตำแหน่ง · ให้เปิดแอปเป็นแท็บเต็มหน้าจอ';
  return null;
}
/* ============ GPS: live capture with accuracy improvement ============ */
const GPS_GOOD_ACC = 10;   // เมตร — ถือว่าแม่นพอ หยุดอัตโนมัติ
const GPS_MAX_WAIT = 45;   // วินาที — รอสูงสุด

function gpsErrMsg(err,pre){
  if(err.code===1)return 'ถูกปฏิเสธสิทธิ์ตำแหน่ง'+(pre?' · '+pre:' · กรุณากดอนุญาตในเบราว์เซอร์');
  if(err.code===2)return 'หาสัญญาณตำแหน่งไม่ได้ · ลองออกที่โล่งแล้วลองใหม่';
  if(err.code===3)return 'หมดเวลารอสัญญาณ · ลองใหม่อีกครั้ง';
  return 'เข้าถึงตำแหน่งไม่ได้';
}

/* one-shot (ใช้กับปุ่มทดสอบ) */
function getGPS(){
  return new Promise((resolve,reject)=>{
    const pre=gpsBlockedReason();
    if(!navigator.geolocation)return reject('ไม่รองรับ GPS');
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({lat:pos.coords.latitude.toFixed(6),lng:pos.coords.longitude.toFixed(6),acc:Math.round(pos.coords.accuracy)}),
      err=>reject((pre&&err.code!==2&&err.code!==3)?pre:gpsErrMsg(err,pre)),
      {enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
  });
}

/* เฝ้าอ่านตำแหน่งต่อเนื่อง จนความแม่นยำดีพอ แล้วให้ผู้ใช้ยืนยัน */
/* ค่าเฉลี่ยถ่วงน้ำหนัก: ค่าที่แม่นกว่ามีน้ำหนักมากกว่า (1/acc^2) */
function weightedAvg(samples){
  let sw=0,slat=0,slng=0;
  samples.forEach(s=>{const w=1/Math.max(1,s.acc*s.acc);sw+=w;slat+=s.lat*w;slng+=s.lng*w;});
  if(!sw)return null;
  // ความคลาดเคลื่อนโดยประมาณของค่าเฉลี่ย
  const bestAcc=Math.min(...samples.map(s=>s.acc));
  const eff=Math.max(3,Math.round(bestAcc/Math.sqrt(samples.length)));
  return {lat:(slat/sw),lng:(slng/sw),acc:eff};
}
/* ความนิ่งของสัญญาณ: ระยะห่างสูงสุดของ 5 ค่าล่าสุด (เมตร) */
function spreadMeters(samples){
  const last=samples.slice(-5);
  if(last.length<2)return null;
  let max=0;
  for(let i=0;i<last.length;i++)for(let j=i+1;j<last.length;j++){
    const dy=(last[i].lat-last[j].lat)*111320;
    const dx=(last[i].lng-last[j].lng)*111320*Math.cos(last[i].lat*Math.PI/180);
    max=Math.max(max,Math.hypot(dx,dy));
  }
  return Math.round(max);
}

    setTimeout(()=>{
      cmap=L.map(wrap.querySelector('#capMap')).setView([12.9236,100.8825],17);
      streets=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(cmap);
      sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'© Esri'});
      setTimeout(()=>cmap.invalidateSize(),80);
    },50);

    wrap.querySelector('#g_sat').onclick=()=>{
      if(!cmap)return;satOn=!satOn;
      if(satOn){cmap.removeLayer(streets);sat.addTo(cmap);wrap.querySelector('#g_sat').textContent='🗺️ ถนน';}
      else{cmap.removeLayer(sat);streets.addTo(cmap);wrap.querySelector('#g_sat').textContent='🛰️ ดาวเทียม';}
    };
    wrap.querySelector('#g_me').onclick=()=>{ if(cmap&&meDot)cmap.setView(meDot.getLatLng(),19); else toast('ยังไม่ได้ตำแหน่ง'); };
    wrap.querySelector('#g_recenter').onclick=()=>{
      const avg=weightedAvg(samples);
      if(!avg){toast('ยังไม่มีค่า GPS');return;}
      manual=false;best={lat:avg.lat.toFixed(6),lng:avg.lng.toFixed(6),acc:avg.acc};
      if(pin)pin.setLatLng([avg.lat,avg.lng]);
      if(cmap)cmap.setView([avg.lat,avg.lng],19);
      coordEl.textContent=best.lat+', '+best.lng;
      paint(avg.acc);toast('ใช้ค่าเฉลี่ย GPS');
    };

    /* จุดสีน้ำเงิน = ตำแหน่งฉัน (อัปเดตตลอด) */
    function drawMe(lat,lng,acc){
      if(!cmap)return;
      const ll=[lat,lng];
      if(!meDot){
        const icon=L.divIcon({className:'',html:'<div style="width:16px;height:16px;border-radius:50%;background:#1E88E5;border:3px solid #fff;box-shadow:0 0 0 2px rgba(30,136,229,.4),0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[16,16],iconAnchor:[8,8]});
        meDot=L.marker(ll,{icon,zIndexOffset:500}).addTo(cmap).bindPopup('ตำแหน่งฉัน');
      }else meDot.setLatLng(ll);
      if(meCircle)meCircle.setLatLng(ll).setRadius(acc);
      else meCircle=L.circle(ll,{radius:acc,color:'#1E88E5',fillColor:'#1E88E5',fillOpacity:.1,weight:1}).addTo(cmap);
    }
    /* หมุดแดง = ตำแหน่งเสา */
    function drawPin(lat,lng,recenter){
      if(!cmap)return;
      const ll=[+lat,+lng];
      if(!pin){
        const icon=L.divIcon({className:'',html:'<div style="width:20px;height:20px;border-radius:50%;background:#E01B24;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[20,20],iconAnchor:[10,10]});
        pin=L.marker(ll,{icon,draggable:true,zIndexOffset:1000}).addTo(cmap).bindPopup('ตำแหน่งเสา (ลากได้)');
        pin.on('dragstart',()=>{manual=true;});
        pin.on('dragend',()=>{
          const q=pin.getLatLng();
          best={lat:q.lat.toFixed(6),lng:q.lng.toFixed(6),acc:''};
          coordEl.textContent=best.lat+', '+best.lng;
          qualEl.textContent='📍 ปรับตำแหน่งเอง (ลากหมุด)';
          accEl.textContent='—';accEl.style.color='var(--ink-soft)';
          fillEl.style.width='100%';fillEl.style.background='var(--ok)';
          stableEl.innerHTML='📍 ใช้ตำแหน่งที่ลากเอง · แม่นที่สุดถ้าเทียบกับภาพดาวเทียม';
          useBtn.disabled=false;useBtn.style.opacity=1;
        });
        cmap.setView(ll,19);
      }else if(!manual)pin.setLatLng(ll);
      if(recenter&&!manual)cmap.panTo(ll);
    }

    function finish(val){
      if(done)return; done=true;
      if(watchId!=null)navigator.geolocation.clearWatch(watchId);
      if(timer)clearInterval(timer);
      wrap.remove(); resolve(val);
    }
    function paint(acc){
      accEl.textContent='±'+acc;
      let pct,color,label;
      if(acc<=10){pct=100;color='var(--ok)';label='✅ แม่นยำมาก';accEl.style.color='var(--ok)';}
      else if(acc<=30){pct=70;color='var(--metal)';label='🟦 พอใช้ได้ · รออีกนิด';accEl.style.color='var(--metal)';}
      else if(acc<=100){pct=40;color='var(--warn)';label='🟧 ยังไม่แม่น · รอดาวเทียม';accEl.style.color='var(--warn)';}
      else{pct=15;color='var(--danger)';label='🟥 คลาดเคลื่อนมาก · ออกที่โล่ง';accEl.style.color='var(--danger)';}
      fillEl.style.width=pct+'%'; fillEl.style.background=color; qualEl.textContent=label;
    }

    timer=setInterval(()=>{
      secs++;
      timeEl.textContent=secs+' วินาที · เก็บ '+samples.length+' ค่า';
      if(secs>=GPS_MAX_WAIT&&watchId!=null){
        navigator.geolocation.clearWatch(watchId); watchId=null;
        qualEl.textContent='⏱️ ครบเวลา · ใช้ค่าเฉลี่ยที่ได้';
      }
    },1000);

    watchId=navigator.geolocation.watchPosition(
      pos=>{
        const acc=Math.round(pos.coords.accuracy);
        const lat=pos.coords.latitude, lng=pos.coords.longitude;
        drawMe(lat,lng,acc);                       // จุดฉัน อัปเดตเสมอ

        if(acc>150)return;                          // ทิ้งค่าที่แย่มาก
        samples.push({lat,lng,acc});
        if(samples.length>30)samples.shift();

        if(manual)return;                           // ผู้ใช้ลากเองแล้ว ไม่ทับ

        const avg=weightedAvg(samples);
        best={lat:avg.lat.toFixed(6),lng:avg.lng.toFixed(6),acc:avg.acc};
        coordEl.textContent=best.lat+', '+best.lng;
        paint(avg.acc);
        drawPin(best.lat,best.lng,true);
        useBtn.disabled=false;useBtn.style.opacity=1;

        const sp=spreadMeters(samples);
        if(sp!=null){
          if(sp<=5)stableEl.innerHTML=`<span style="color:var(--ok);font-weight:600">🟢 สัญญาณนิ่งมาก (แกว่ง ${sp} ม.) · เก็บ ${samples.length} ค่า</span>`;
          else if(sp<=15)stableEl.innerHTML=`<span style="color:var(--warn);font-weight:600">🟡 สัญญาณแกว่ง ${sp} ม. · รออีกสักครู่</span>`;
          else stableEl.innerHTML=`<span style="color:var(--danger);font-weight:600">🔴 สัญญาณแกว่งมาก ${sp} ม. · ยืนนิ่ง/ออกที่โล่ง</span>`;
        }

        // หยุดอัตโนมัติเมื่อ: แม่นพอ + เก็บพอ + นิ่งพอ
        if(!autoStopped&&avg.acc<=GPS_GOOD_ACC&&samples.length>=6&&sp!=null&&sp<=8){
          autoStopped=true;
          navigator.geolocation.clearWatch(watchId);watchId=null;
          if(timer)clearInterval(timer);
          qualEl.textContent='✅ แม่นยำและนิ่งพอแล้ว · กดถัดไปได้';
        }
      },
      err=>{
        if(done)return;
        const msg=(pre&&err.code!==2&&err.code!==3)?pre:gpsErrMsg(err,pre);
        if(!best){ finish(null); alert('ใช้ GPS ไม่ได้\n\n'+msg+'\n\nลองใช้ "🗺️ ปักหมุดบนแผนที่" แทน'); }
        else qualEl.textContent='⚠️ สัญญาณขาดช่วง · ใช้ค่าล่าสุด หรือลากหมุด';
      },
      {enableHighAccuracy:true,timeout:GPS_MAX_WAIT*1000,maximumAge:0}
    );

    wrap.querySelector('#g_cancel').onclick=()=>finish(null);
    useBtn.onclick=()=>{ if(best)finish(best); };
  });
}

/* ปักหมุด/ลากหมุดบนแผนที่ · ปรับตำแหน่งให้ตรงจุดได้ */
function pickOnMap(initLat,initLng){
  return new Promise(resolve=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;inset:0;background:rgba(27,36,48,.6);z-index:2000;display:flex;align-items:flex-end;justify-content:center;';
    wrap.innerHTML=`<div style="background:#fff;width:100%;max-width:760px;border-radius:18px 18px 0 0;padding:16px 14px 20px">
      <div style="font-weight:700;font-size:16px;margin-bottom:2px">ปักหมุดเลือกตำแหน่ง</div>
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px">แตะเพื่อวางหมุด · <b>ลากหมุดเพื่อปรับให้ตรงจุด</b> · ซูมเข้าเพื่อความแม่นยำ</div>
      <div id="pickMap" style="width:100%;height:320px;border:1px solid var(--line);border-radius:12px"></div>
      <div class="mono" id="pickCoord" style="font-size:12px;color:var(--ink-soft);margin-top:8px;text-align:center">— ยังไม่ได้เลือก —</div>
      <div class="action-row">
        <button class="btn btn-outline btn-sm" id="pk_sat">🛰️ ภาพดาวเทียม</button>
        <button class="btn btn-outline btn-sm" id="pk_me">📍 ตำแหน่งฉัน</button>
      </div>
      <div class="action-row">
        <button class="btn btn-outline" id="pk_cancel">ยกเลิก</button>
        <button class="btn btn-ok" id="pk_ok">ใช้ตำแหน่งนี้</button>
      </div>
    </div>`;
    document.body.appendChild(wrap);
    let chosen=null, m=null, mk=null, satOn=false, streets=null, sat=null;
    const c=[+initLat||12.9236,+initLng||100.8825];

    function setPin(latlng){
      chosen={lat:latlng.lat.toFixed(6),lng:latlng.lng.toFixed(6)};
      if(mk)mk.setLatLng(latlng);
      else{mk=L.marker(latlng,{draggable:true}).addTo(m);
        mk.on('dragend',()=>{const p=mk.getLatLng();chosen={lat:p.lat.toFixed(6),lng:p.lng.toFixed(6)};
          wrap.querySelector('#pickCoord').textContent=chosen.lat+', '+chosen.lng;});}
      wrap.querySelector('#pickCoord').textContent=chosen.lat+', '+chosen.lng;
    }

    setTimeout(()=>{
      m=L.map(document.getElementById('pickMap')).setView(c,(initLat&&initLng)?18:13);
      streets=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(m);
      sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'© Esri'});
      if(initLat&&initLng)setPin(L.latLng(+initLat,+initLng));
      m.on('click',e=>setPin(e.latlng));
      setTimeout(()=>m.invalidateSize(),100);
    },60);

    wrap.querySelector('#pk_sat').onclick=()=>{
      if(!m)return;
      satOn=!satOn;
      if(satOn){m.removeLayer(streets);sat.addTo(m);wrap.querySelector('#pk_sat').textContent='🗺️ แผนที่ถนน';}
      else{m.removeLayer(sat);streets.addTo(m);wrap.querySelector('#pk_sat').textContent='🛰️ ภาพดาวเทียม';}
    };
    wrap.querySelector('#pk_me').onclick=()=>{
      if(!navigator.geolocation||!m){toast('ไม่รองรับ GPS');return;}
      toast('กำลังหาตำแหน่ง...');
      navigator.geolocation.getCurrentPosition(pos=>{
        const ll=L.latLng(pos.coords.latitude,pos.coords.longitude);
        m.setView(ll,18);setPin(ll);
        toast('±'+Math.round(pos.coords.accuracy)+' ม. · ลากหมุดปรับได้');
      },()=>toast('เข้าถึงตำแหน่งไม่ได้'),{enableHighAccuracy:true,timeout:15000,maximumAge:0});
    };

    const close=v=>{wrap.remove();resolve(v);};
    wrap.querySelector('#pk_cancel').onclick=()=>close(null);
    wrap.onclick=e=>{if(e.target===wrap)close(null);};
    wrap.querySelector('#pk_ok').onclick=()=>{if(!chosen){toast('แตะบนแผนที่เพื่อเลือกก่อน');return;}close(chosen);};
  });
}

/* test GPS and report result */
async function testGPS(){
  toast('กำลังทดสอบ...');
  try{
    const g=await getGPS();
    let q = g.acc<=10?'แม่นยำมาก ✅' : g.acc<=30?'พอใช้ได้' : g.acc<=100?'ยังไม่แม่น' : 'คลาดเคลื่อนมาก ❌';
    alert('✅ GPS ใช้งานได้\n\nพิกัด: '+g.lat+', '+g.lng+'\nความคลาดเคลื่อน: ±'+g.acc+' เมตร ('+q+')\n\nหมายเหตุ: ค่าครั้งแรกมักมาจาก Wi-Fi/เสาสัญญาณ\nใช้ปุ่ม "ใช้ตำแหน่งปัจจุบัน" จะรอสัญญาณดาวเทียมให้แม่นขึ้น');
  }catch(msg){
    alert('❌ GPS ใช้ไม่ได้\n\nสาเหตุ: '+msg+'\n\nระหว่างนี้ใช้ปุ่ม "🗺️ ปักหมุดบนแผนที่" แทนได้');
  }
}

/* จับ GPS แบบแม่นยำ; ถ้าไม่ได้ ให้ปักหมุดแทน */
async function getLocationSmart(curLat,curLng){
  const pre=gpsBlockedReason();
  if(pre&&!navigator.geolocation){
    if(confirm('ใช้ GPS ไม่ได้: '+pre+'\n\nปักหมุดบนแผนที่แทนหรือไม่?'))return await pickOnMap(curLat,curLng);
    return null;
  }
  const g=await captureGPS();
  if(g)return g;
  return null;
}

    <div class="field"><label>ประเภทหลอดของเสาต้นนี้</label>
      <div class="choice" id="${idPrefix}_type">
        ${types.map(([v,l])=>`<label class="${curType===v?'sel sel-'+v:''}" data-v="${v}"><input type="radio" name="${idPrefix}lt" value="${v}" ${curType===v?'checked':''}><span>${l}</span></label>`).join('')}
      </div>
      <input type="text" id="${idPrefix}_typeother" style="margin-top:8px;${curType==='other'?'':'display:none'}" value="${esc(curOther||'')}" placeholder="ระบุประเภทหลอด">
    </div>
    <div class="field"><label>ขนาดหลอด (วัตต์)</label>
      <div class="choice watt-choice" id="${idPrefix}_watt">
        ${watts.map(w=>`<label class="${wsel===w?'selw':''}" data-w="${w}"><input type="radio" name="${idPrefix}wt" value="${w}" ${wsel===w?'checked':''}><span>${w}W</span></label>`).join('')}
        <label class="${(wsel===''&&curWatt)?'selw':''}" data-w="custom" style="flex:1.3"><input type="radio" name="${idPrefix}wt" value="custom" ${(wsel===''&&curWatt)?'checked':''}><span>อื่นๆ</span></label>
      </div>
      <input type="text" id="${idPrefix}_wattcustom" style="margin-top:8px;${(wsel===''&&curWatt)?'':'display:none'}" value="${(wsel===''&&curWatt)?esc(curWatt):''}" placeholder="ระบุวัตต์">
    </div>`;
